experimental_monorepo_root = true

[settings]
# Refuse to install tool versions released less than 7 days ago. Mitigates the
# malicious-publish supply-chain attack window: most compromised releases are
# detected and yanked within 24-48 hours, so a 7-day cooldown blocks the bulk
# of them at resolution time. Requires mise >= 2026.4.25.
minimum_release_age = "7d"

[monorepo]
config_roots = [
    "elixir",
    "kotlin/android",
    "rust",
    "swift/apple",
]

[tasks.lint-setup]
description = "Install linting tools from version-pinned files (managed by Dependabot)"
run = """
pip install -r .github/requirements.txt
pnpm i --frozen-lockfile --dir ./.github
pnpm i --frozen-lockfile --dir ./website
"""

[tasks.lint]
description = "Run pre-commit hooks on all files"
run = "pre-commit run --all-files --config .github/pre-commit-config.yaml"

[tasks.lint-staged]
description = "Run pre-commit hooks on staged files only"
run = "pre-commit run --config .github/pre-commit-config.yaml"
