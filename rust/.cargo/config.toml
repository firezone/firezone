[target.x86_64-unknown-linux-musl]
linker = "clang"
rustflags = ["-C", "force-frame-pointers=yes", "-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "force-frame-pointers=yes", "-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# https://github.com/rust-lang/rust/issues/141626
# (can be removed once link.exe is fixed)
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[profile.profiling]
inherits = "release"
debug = true

# Set consistent macOS deployment target to prevent rebuilds
# when environment variables change between Xcode and CLI builds
# This must match the Xcode project setting (13.0)
[env]
MACOSX_DEPLOYMENT_TARGET = "13.0"
