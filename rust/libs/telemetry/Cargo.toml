[package]
name = "telemetry"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
hex = { workspace = true }
http = { workspace = true }
http-client = { workspace = true }
ip-packet = { workspace = true }
moka = { workspace = true, features = ["sync"] }
opentelemetry = { workspace = true }
opentelemetry-http = { workspace = true }
opentelemetry-otlp = { workspace = true, features = ["metrics", "http-proto"] }
opentelemetry_sdk = { workspace = true, features = ["metrics"] }
parking_lot = { workspace = true }
rand = { workspace = true }
sentry = { workspace = true, features = ["contexts", "backtrace", "debug-images", "panic", "reqwest", "rustls-no-provider", "tracing", "logs", "metrics"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
smallvec = { workspace = true }
socket-factory = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tunnel-bypass-resolver = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
rustls = { workspace = true, features = ["ring"] }
socket-factory = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
tokio-tungstenite = { workspace = true }

[lints]
workspace = true
