[package]
name = "tunnel"
version = "0.1.0"
edition = { workspace = true }
license = { workspace = true }

[features]
proptest = ["tunnel-proto/proptest", "tunnel-proto/malicious-behaviour"]

[dependencies]
anyhow = { workspace = true }
bootstrap-dns-client = { workspace = true }
bufferpool = { workspace = true }
connlib-model = { workspace = true }
dns-types = { workspace = true }
eventloop-budget = { workspace = true }
futures = { workspace = true }
futures-bounded = { workspace = true, features = ["tokio"] }
gat-lending-iterator = { workspace = true }
http-client = { workspace = true }
ip-packet = { workspace = true }
itertools = { workspace = true, features = ["use_std"] }
l4-tcp-dns-server = { workspace = true }
l4-udp-dns-server = { workspace = true }
logging = { workspace = true }
opentelemetry = { workspace = true, features = ["metrics"] }
otel-instruments = { workspace = true }
rand = { workspace = true }
snownet = { workspace = true }
socket-factory = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true, features = ["attributes"] }
tun = { workspace = true }
tunnel-proto = { workspace = true }

[dev-dependencies]
chrono = { workspace = true }
derive_more = { workspace = true, features = ["debug"] }
dns-over-tcp = { workspace = true }
firezone-relay = { workspace = true, features = ["proptest"] }
flow-tracker = { workspace = true }
hex = { workspace = true }
ip-packet = { workspace = true, features = ["proptest"] }
ip_network = { workspace = true }
ip_network_table = { workspace = true }
itertools = { workspace = true }
l3-tcp = { workspace = true }
proptest = { workspace = true }
proptest-state-machine = { workspace = true }
rand = { workspace = true }
rustls = { workspace = true }
secrecy = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
test-strategy = { workspace = true }
tokio = { workspace = true, features = ["macros", "process", "rt", "test-util"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true
