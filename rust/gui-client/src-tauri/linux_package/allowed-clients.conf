# Binaries permitted to connect to the Firezone tunnel service.
#
# One absolute path per line; lines starting with `#` and blank lines are
# ignored. Paths must be canonical (no `..`, no symlinks the daemon can't
# resolve to a target on a root-owned filesystem). The target binary and
# every directory up to the filesystem root must be owned and writable by
# root only; entries that fail this check are skipped and logged.
#
# The tunnel service obtains a pidfd for each incoming peer via
# SO_PEERPIDFD and resolves /proc/<peer_pid>/exe against this list. On
# kernels older than 6.5 the service cannot enforce the allowlist and
# logs that fact per connection.
#
# This file is shipped as a deb conffile / rpm noreplace config so local
# edits survive package upgrades.

/usr/bin/firezone-client-gui
