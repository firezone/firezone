[package]
name = "firezone-gui-client"
# mark:next-gui-version
version = "1.5.13"
description = "Firezone"
edition = { workspace = true }
default-run = "firezone-gui-client"
authors = ["Firezone, Inc."]
license = { workspace = true }

[package.metadata.tslink]
enum_representation = "discriminated"

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
# TODO: We can probably remove this, per <https://github.com/tauri-apps/tauri/releases/tag/tauri-v2.0.0-beta.8>
# I don't know how to verify this change, so I won't do it right now.
custom-protocol = ["tauri/custom-protocol"]

# Experimental iced-based GUI, off by default. When enabled, the
# `firezone-gui-client` binary accepts `--experimental-gui` to launch the
# iced UI instead of Tauri. Gates the iced-only dependencies (`iced` plus
# the `ksni` / `tray-icon` tray backends) and the `src/iced` module tree, so
# default builds compile none of it.
experimental-gui = ["dep:iced", "dep:ksni", "dep:tray-icon"]

# Experimental xilem-based GUI, off by default and parallel to
# `experimental-gui`. When enabled, the `firezone-gui-client` binary accepts
# `--experimental-xilem-gui` to launch the xilem UI. Gates the `xilem`
# dependency and the `src/xilem` module tree, so default builds compile none of
# it. Also gates the `ksni` / `tray-icon` tray backends (shared with the iced
# tray). NOTE: xilem renders through Vello/wgpu and has no software-renderer
# fallback, so this UI requires a working GPU and will not run headless.
experimental-xilem-gui = ["dep:xilem", "dep:ksni", "dep:tray-icon"]

[dependencies]
anyhow = { workspace = true }
arboard = { workspace = true }
atomicwrites = { workspace = true }
backoff = { workspace = true }
bin-shared = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
client-shared = { workspace = true }
connlib-model = { workspace = true }
derive_more = { workspace = true, features = ["debug"] }
fd-lock = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
humantime = { workspace = true }
iced = { workspace = true, optional = true }
ip-packet = { workspace = true }
ip_network = { workspace = true }
keyring-core = { workspace = true }
known-dirs = { workspace = true }
logging = { workspace = true }
native-dialog = { workspace = true }
open = { workspace = true }
output_vt100 = { workspace = true }
parking_lot = { workspace = true }
phoenix-channel = { workspace = true }
png = { workspace = true } # `png` is mostly free since we already need it for Tauri
rand = { workspace = true }
reqwest = { workspace = true, features = ["stream", "rustls-no-provider"] }
rustls = { workspace = true, features = ["ring"] }
sadness-generator = { workspace = true }
secrecy = { workspace = true, features = ["serde"] }
semver = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_variant = { workspace = true }
specta = { workspace = true, features = ["url"] }
specta-typescript = { workspace = true }
strum = { workspace = true }
subtle = { workspace = true }
tauri = { workspace = true, features = ["tray-icon", "image-png"] }
tauri-plugin-dialog = { workspace = true }
tauri-plugin-opener = { workspace = true }
tauri-runtime = { workspace = true }
tauri-specta = { workspace = true }
tauri-utils = { workspace = true }
telemetry = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["signal", "time", "macros", "rt", "rt-multi-thread"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["codec"] }
tracing = { workspace = true }
tracing-log = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
xilem = { workspace = true, optional = true }
zip = { workspace = true, features = ["deflate", "time"] }

[target.'cfg(target_os = "linux")'.dependencies]
dbus-secret-service-keyring-store = { workspace = true }
dirs = { workspace = true }
ksni = { workspace = true, optional = true }
libc = { workspace = true }
nix = { workspace = true, features = ["user"] }
notify-rust = { workspace = true }
sd-notify = { workspace = true }
tracing-journald = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
tray-icon = { workspace = true, optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
admx-macro = { workspace = true }
tauri-winrt-notification = "0.7.2"
tray-icon = { workspace = true, optional = true }
windows-native-keyring-store = { workspace = true }
windows-security = { workspace = true }
windows-service = { workspace = true }
winreg = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies.windows]
workspace = true
features = [
    "Win32_Foundation",
    # `SECURITY_ATTRIBUTES`, `IsWellKnownSid` for the pipe
    "Win32_Security",
    # `GetSecurityInfo` for the pipe-owner SID check
    "Win32_Security_Authorization",
    # IPC system
    "Win32_System_Pipes",
    "Win32_System_Threading",
]

[build-dependencies]
anyhow = { workspace = true }
tauri-build = { workspace = true, features = [] }

[dev-dependencies]
bin-shared = { workspace = true, features = ["test"] }
tempfile = { workspace = true }

[lints]
workspace = true
