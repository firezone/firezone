clap = { workspace = true, features = ["derive", "env"] }
client-shared = { workspace = true }
connlib-model = { workspace = true }
derive_more = { workspace = true, features = ["debug"] }
fd-lock = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
humantime = { workspace = true }
ip-packet = { workspace = true }
ip_network = { workspace = true }
keyring-core = { workspace = true }
known-dirs = { workspace = true }
logging = { workspace = true }
native-dialog = { workspace = true }
output_vt100 = { workspace = true }
parking_lot = { workspace = true }
phoenix-channel = { workspace = true }
png = { workspace = true } # `png` is mostly free since we already need it for Tauri
rand = { workspace = true }
reqwest = { workspace = true, features = ["stream", "rustls-no-provider"] }
rustls = { workspace = true, features = ["ring"] }
sadness-generator = { workspace = true }
secrecy = { workspace = true, features = ["serde"] }
semver = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_variant = { workspace = true }
specta = { workspace = true, features = ["url"] }
specta-typescript = { workspace = true }
strum = { workspace = true }
subtle = { workspace = true }
tauri = { workspace = true, features = ["tray-icon", "image-png"] }
tauri-plugin-dialog = { workspace = true }
tauri-plugin-opener = { workspace = true }
tauri-runtime = { workspace = true }
tauri-specta = { workspace = true }
tauri-utils = { workspace = true }
telemetry = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["signal", "time", "macros", "rt", "rt-multi-thread"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["codec"] }
tracing = { workspace = true }
tracing-log = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
zip = { workspace = true, features = ["deflate", "time"] }

[target.'cfg(target_os = "linux")'.dependencies]
dbus-secret-service-keyring-store = { workspace = true }
dirs = { workspace = true }
libc = { workspace = true }
nix = { workspace = true, features = ["user"] }
notify-rust = { workspace = true }
sd-notify = { workspace = true }
tracing-journald = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]

[target.'cfg(target_os = "windows")'.dependencies]
admx-macro = { workspace = true }
tauri-winrt-notification = "0.7.2"
windows-native-keyring-store = { workspace = true }
windows-security = { workspace = true }
windows-service = { workspace = true }
winreg = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies.windows]
workspace = true
features = [
    "Win32_Foundation",
    # `SECURITY_ATTRIBUTES`, `IsWellKnownSid` for the pipe
    "Win32_Security",
    # `GetSecurityInfo` for the pipe-owner SID check
    "Win32_Security_Authorization",
    # IPC system
    "Win32_System_Pipes",
    "Win32_System_Threading",
    # `ProcessIdToSessionId` for the GUI-pipe cross-session check.
    "Win32_System_RemoteDesktop",
    # WinRT `Windows.Foundation.Uri` and
    # `Windows.Management.Deployment.PackageManager` for the
    # `register-sparse.exe` WiX custom action.
    "Foundation",
    "Management_Deployment",
    # `Package` / `PackageId` returned by
    # `FindPackagesByPackageFamilyName`, plus `IIterable<Package>`
    # iteration to enumerate stale registrations before provisioning
    # a new external location.
    "ApplicationModel",
    "Foundation_Collections",
]

[build-dependencies]
anyhow = { workspace = true }
sha2 = { workspace = true }
tauri-build = { workspace = true, features = [] }

[target.'cfg(target_os = "windows")'.build-dependencies]
embed-resource = { workspace = true }

[dev-dependencies]
bin-shared = { workspace = true, features = ["test"] }
tempfile = { workspace = true }

[lints]
workspace = true
