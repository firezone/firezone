# Fuzzing runs on a dedicated nightly toolchain, pinned here via
# `RUSTUP_TOOLCHAIN` so the tasks below run plain `cargo` commands without a
# `rustup run <version>` prefix. It lives here instead of in `rust/mise.toml`
# so that it only applies to fuzzing.
#
# The toolchain is not a `rust` entry in `[tools]` because rustup-managed
# toolchains have no download URL for mise to pin in `mise.lock`, which strict
# lockfile mode requires.

[tools]
"cargo:cargo-fuzz" = { version = "0.13.2", os = ["linux"] }

[env]
RUSTUP_TOOLCHAIN = "nightly-2026-03-30"
# LTO conflicts with the libFuzzer instrumentation.
CARGO_PROFILE_RELEASE_LTO = "false"
# The workspace profile trades compile time for smaller binaries
# (codegen-units = 1); for fuzz builds, compile time matters more.
CARGO_PROFILE_RELEASE_CODEGEN_UNITS = "16"

[tasks.install-toolchain]
description = "Install the pinned nightly with the components fuzzing needs"
# Status output goes to stderr so tasks that depend on this one can keep a
# machine-readable stdout.
run = 'rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal --component rust-src --component llvm-tools-preview 1>&2'

[tasks.fuzz]
description = "Run a fuzz target with its target-specific defaults; extra args are passed to libFuzzer"
depends = [
  "install-toolchain",
  { task = "unpack-corpus", args = ["{{usage.target}}"] },
]
usage = '''
arg "<target>"
arg "[libfuzzer_args]…" var=#true
'''
raw = true
run = '''
set -euo pipefail

target="$usage_target"

if [ -n "$usage_libfuzzer_args" ]; then
  # `usage` joins variadic arguments as a shell-escaped string.
  eval "set -- $usage_libfuzzer_args"
else
  set -- -max_total_time=60
fi

if [ "$target" = "tunnel-proto" ]; then
  set -- -max_len=8192 -len_control=0 "$@"
fi

cargo fuzz run --target x86_64-unknown-linux-gnu --fuzz-dir . --target-dir ../../target "$target" -- "$@"
'''

[tasks.cmin]
description = "Minimize the corpus of a fuzz target"
depends = [
  "install-toolchain",
  { task = "unpack-corpus", args = ["{{usage.target}}"] },
]
usage = 'arg "<target>"'
raw = true
env = { ASAN_OPTIONS = "detect_leaks=0" }
run = '''
set -euo pipefail

cargo fuzz cmin --target x86_64-unknown-linux-gnu --fuzz-dir . --target-dir ../../target "$usage_target"
'''

[tasks.pack-corpus]
description = "Pack a fuzz target's corpus into its deterministic archive"
usage = 'arg "<target>"'
raw = true
run = '''
set -euo pipefail

target="$usage_target"
corpus="corpus/$target"
archive="corpora/$target.tar.gz"

mkdir -p corpora
temporary="$(mktemp "corpora/.$target.XXXXXX")"
trap 'rm -f "$temporary"' EXIT

tar \
  --sort=name \
  --mtime=@0 \
  --owner=0 \
  --group=0 \
  --numeric-owner \
  --format=ustar \
  -cf - \
  -C "$corpus" . |
  gzip -n > "$temporary"

mv "$temporary" "$archive"
chmod 0644 "$archive"
'''

[tasks.unpack-corpus]
description = "Unpack a fuzz target's committed corpus"
usage = 'arg "<target>"'
raw = true
run = '''
set -euo pipefail

target="$usage_target"
archive="corpora/$target.tar.gz"
corpus="corpus/$target"

if tar -tzf "$archive" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
  echo "error: refusing to unpack unsafe paths from $archive" >&2
  exit 1
fi

mkdir -p "$corpus"
tar -xzf "$archive" --no-same-owner --no-same-permissions -C "$corpus"
'''

[tasks.coverage]
description = "Replay the corpus of a fuzz target, producing coverage/<target>/coverage.profdata"
depends = [
  "install-toolchain",
  { task = "unpack-corpus", args = ["{{usage.target}}"] },
]
usage = 'arg "<target>"'
raw = true
env = { ASAN_OPTIONS = "detect_leaks=0" }
run = '''
set -euo pipefail

cargo fuzz coverage --target x86_64-unknown-linux-gnu --fuzz-dir . --target-dir ../../target "$usage_target"
'''

[tasks.coverage-summary]
description = "Print region coverage for the crate with the same name as the fuzz target"
depends = ["install-toolchain"]
usage = 'arg "<crate>"'
raw = true
run = '''
set -euo pipefail

crate="$usage_crate"
profile="coverage/$crate/coverage.profdata"
binary="../../target/x86_64-unknown-linux-gnu/release/$crate"
llvm_cov="$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov"
manifest="$(
  cargo metadata --format-version=1 --no-deps |
    jq -er --arg crate "$crate" '.packages[] | select(.name == $crate) | .manifest_path'
)"
crate_dir="${manifest%/Cargo.toml}/"

"$llvm_cov" export -instr-profile="$profile" "$binary" |
  jq -e --arg crate_dir "$crate_dir" '
    [.data[].files[]
      | select(.filename | startswith($crate_dir))
      | .summary.regions
    ]
    | if length == 0 then
        error("coverage profile contains no files for " + $crate_dir)
      else
        {
          covered: (map(.covered) | add),
          total: (map(.count) | add)
        }
      end
  '
'''

[tasks.coverage-check]
description = "Fail if a crate exceeds its committed uncovered-region ceiling"
usage = 'arg "<crate>"'
raw = true
run = '''
set -euo pipefail

crate="$usage_crate"
expected_file="expected-coverage/$crate.json"
measured="$(mise run -q //rust/tests/fuzz:coverage-summary "$crate")"
expected="$(<"$expected_file")"
measured_uncovered="$(jq '.total - .covered' <<<"$measured")"
expected_uncovered="$(jq '.total - .covered' <<<"$expected")"
measured_percent="$(jq '100 * .covered / .total' <<<"$measured")"
expected_percent="$(jq '100 * .covered / .total' <<<"$expected")"

printf 'measured: %s (%.2f%% covered, %d uncovered)\n' \
  "$(jq -c . <<<"$measured")" "$measured_percent" "$measured_uncovered"
printf 'expected: %s (%.2f%% covered, %d uncovered)\n' \
  "$(jq -c . <<<"$expected")" "$expected_percent" "$expected_uncovered"

if (( measured_uncovered <= expected_uncovered )); then
  exit 0
fi

echo "error: $crate has $measured_uncovered uncovered regions; $expected_file allows $expected_uncovered" >&2
exit 1
'''

[tasks.lcov]
description = "Export an existing fuzz coverage profile as lcov"
depends = ["install-toolchain"]
usage = 'arg "<crate>"'
raw = true
run = '"$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov" export -format=lcov -instr-profile=coverage/$usage_crate/coverage.profdata ../../target/x86_64-unknown-linux-gnu/release/$usage_crate'

[tasks.llvm-cov]
description = "Run the nightly toolchain's llvm-cov, e.g. to post-process coverage.profdata"
depends = ["install-toolchain"]
usage = 'arg "<llvm_cov_args>" var=#true'
raw = true
run = '"$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov" $usage_llvm_cov_args'
