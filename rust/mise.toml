# Rust development tasks
#
# Usage: mise run <task> (from this directory) or mise //rust:<task> (from repo root)

[settings]
auto_install = false

[env]
# Match CI environment - enables tokio unstable features and denies warnings
RUSTFLAGS = "--cfg tokio_unstable"
# Nightly version used for cargo-udeps (keep in sync with .github/actions/setup-rust-nightly)
NIGHTLY_VERSION = "nightly-2025-09-30"

# =============================================================================
# Individual checks (matching CI)
# =============================================================================

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt"

[tasks.fmt-check]
description = "Check Rust formatting (CI check)"
run = "cargo fmt -- --check"

[tasks.clippy]
description = "Run clippy lints (CI check)"
run = "cargo clippy --all-targets --all-features"

[tasks.doc]
description = "Build documentation (CI check)"
run = "cargo doc --all-features --no-deps --document-private-items"

[tasks.udeps]
description = "Check for unused dependencies (CI check, requires nightly)"
run = "cargo +$NIGHTLY_VERSION udeps --all-targets --all-features"

[tasks.deny]
description = "Check licenses and security advisories (CI check)"
run = "cargo deny check --hide-inclusion-graph --deny unnecessary-skip"

[tasks.test]
description = "Run tests (CI check)"
run = "cargo test --all-features -- --include-ignored --nocapture"

[tasks.tunnel-proptest]
description = "Run the tunnel proptest suite with extended case/shrink budgets"
dir = "libs/connlib/tunnel"
env = { CARGO_PROFILE_TEST_OPT_LEVEL = "1", PROPTEST_CASES = "10000", PROPTEST_MAX_SHRINK_ITERS = "100" }
raw = true
run = "cargo test tunnel_test --features proptest -- --nocapture"

# This task is particularly useful to purposely find a regression seed for a certain failure scenario that
# we want to hit. The corresponding CI job performs a log-based coverage check to ensure that.
[tasks.tunnel-proptest-x16]
description = "Run tunnel-proptest 16 times in parallel, aborting all on first failure"
dir = "libs/connlib/tunnel"
env = { CARGO_PROFILE_TEST_OPT_LEVEL = "1", PROPTEST_CASES = "10000", PROPTEST_MAX_SHRINK_ITERS = "100" }
raw = true
run = """
#!/usr/bin/env bash
# `set -m` puts each `&`-backgrounded cargo in its own process group so we can
# signal the whole subtree (cargo + test binary) via `kill -TERM -$pgid`.
set -muo pipefail

mv proptest-regressions/tests.txt proptest-regressions/tests.txt.bak

# Build once up-front so the 16 parallel `cargo test` invocations don't
# serialize on the target-dir lock.
cargo test tunnel_test --features proptest --no-run

pids=()

cleanup() {
    for pid in "${pids[@]}"; do
        kill -TERM -"$pid" 2>/dev/null || true
    done
    wait 2>/dev/null || true
}
trap cleanup EXIT
trap 'exit 130' INT TERM

for _ in $(seq 16); do
    cargo test tunnel_test --features proptest -- --nocapture &
    pids+=($!)
done

for _ in "${pids[@]}"; do
    wait -n || exit 1
done
"""

# =============================================================================
# Composite tasks
# =============================================================================

[tasks.check]
description = "Run all CI static analysis checks"
depends = ["fmt-check", "clippy", "doc", "deny"]

[tasks.check-all]
description = "Run all CI static analysis checks including udeps (requires nightly)"
depends = ["fmt-check", "clippy", "doc", "udeps", "deny"]
