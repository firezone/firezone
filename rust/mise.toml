# Rust development tasks
#
# Usage: mise run <task> (from this directory) or mise //rust:<task> (from repo root)

[settings]
auto_install = false

[env]
# Match CI environment - enables tokio unstable features and denies warnings
RUSTFLAGS = "--cfg tokio_unstable"

[tools]
"github:aya-rs/bpf-linker" = { version = "0.10.3", os = ["linux"] }
"cargo:cargo-deb" = { version = "3.7.0", os = ["linux"] }
"github:taiki-e/cargo-llvm-cov" = "0.6.21"
"github:tauri-apps/tauri" = { version = "2.11.2", version_prefix = "tauri-cli-v" }

# =============================================================================
# Individual checks (matching CI)
# =============================================================================

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt"

[tasks.fmt-check]
description = "Check Rust formatting (CI check)"
run = "cargo fmt -- --check"

[tasks.clippy]
description = "Run clippy lints (CI check)"
run = "cargo clippy --all-targets --all-features"

[tasks.doc]
description = "Build documentation (CI check)"
run = "cargo doc --all-features --no-deps --document-private-items"

[tasks.shear]
description = "Check for unused dependencies (CI check)"
run = "cargo shear"

[tasks.deny]
description = "Check licenses and security advisories (CI check)"
run = "cargo deny check --hide-inclusion-graph --deny unnecessary-skip"

[tasks.test]
description = "Run tests (CI check)"
run = "cargo test --all-features -- --include-ignored --nocapture"

[tasks.tunnel-proptest]
description = "Run the tunnel proptest suite with extended case/shrink budgets"
dir = "libs/connlib/tunnel-tests"
env = { CARGO_PROFILE_TEST_OPT_LEVEL = "1", PROPTEST_CASES = "10000", PROPTEST_MAX_SHRINK_ITERS = "100" }
raw = true
run = "cargo test tunnel_test -- --nocapture"

[tasks.tauri-mock]
description = "Run the GUI client for rapid UI iteration with an in-process mock Tunnel service (--mock-tunnel) and the portal decoupled (--skip-portal-auth). Self-contained: no root, no separate process."
dir = "gui-client"
raw = true
run = "cargo tauri dev -- -- --skip-portal-auth --mock-tunnel"

[tasks.tauri-dev]
description = "Run the GUI client in dev against a dev tunnel service"
dir = "gui-client"
raw = true
run = "cargo tauri dev -- -- --skip-tunnel-pipe-owner-check"

[tasks.tunnel]
description = "Run the Tunnel service interactively for local GUI dev. In debug builds `run-interactive` skips the LocalSystem pipe-owner check; must be run from an elevated (Administrator) shell."
dir = "gui-client"
raw = true
run = "cargo run -p firezone-gui-client --bin firezone-client-tunnel -- run-interactive"

# =============================================================================
# Profiling
# =============================================================================

[tasks.record-perf-client-gateway]
description = "Capture perf data from a locally running headless-client and gateway."
raw = true
run = """
set -u

# Capture every client/gateway process (comma-separated for `perf -p`). Idle ones (e.g. an
# unused `client-2`) contribute ~no samples, so this avoids guessing which container ran the test.
client=$(pgrep -x firezone-headle | paste -sd, -)
gateway=$(pgrep -x firezone-gatewa | paste -sd, -)
[ -n "$client" ] || { echo "firezone-headless-client is not running" >&2; exit 1; }

freq="${PERF_FREQ:-10000}"
me="$(id -u):$(id -g)"
statpids="$client"; [ -n "$gateway" ] && statpids="$client,$gateway"

echo "Recording: client $client${gateway:+, gateway $gateway}"
echo ">>> run your iperf, then press Ctrl-C to stop <<<"

# Survive Ctrl-C so the EXIT trap can chown; the perf children get the same
# SIGINT and flush their own files.
trap : INT
trap 'for f in perf-client.data perf-gateway.data perf-sched.data perf-stat.txt; do [ -f "$f" ] && sudo chown "$me" "$f" 2>/dev/null; done' EXIT

sudo -v # cache credentials so the background recorders do not each prompt

# Per-process cycles profiles carry the CPU id (--sample-cpu) for migration analysis.
sudo perf record -F "$freq" --call-graph fp --sample-cpu -o perf-client.data -p "$client" &
[ -n "$gateway" ] && sudo perf record -F "$freq" --call-graph fp --sample-cpu -o perf-gateway.data -p "$gateway" &
sudo perf sched record -o perf-sched.data &
sudo perf stat -p "$statpids" -e task-clock,cycles,instructions,cpu-migrations,context-switches,cache-references,cache-misses -o perf-stat.txt &

wait # blocks until Ctrl-C fires the INT trap
wait # reap the recorders once they have flushed
echo "Done: perf-client.data${gateway:+ perf-gateway.data} perf-sched.data perf-stat.txt"
"""

# =============================================================================
# Composite tasks
# =============================================================================

[tasks.check]
description = "Run all CI static analysis checks"
depends = ["fmt-check", "clippy", "doc", "deny"]

[tasks.check-all]
description = "Run all CI static analysis checks including unused dependencies"
depends = ["fmt-check", "clippy", "doc", "shear", "deny"]
