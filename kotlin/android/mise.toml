# Android development tasks
#
# Tasks are auto-discovered from mise-tasks/ directory.
# Task names match filenames (e.g., mise-tasks/format.sh -> //kotlin/android:format)

[settings]
auto_install = false

[env]
# Single source of truth for Android tool versions used by tasks and setup.sh.
# Keep the NDK version in sync with `app/build.gradle.kts` and
# `.github/actions/setup-android/action.yml`.
NDK_VERSION = "28.1.13356709"
ANDROID_CMD_TOOLS_VERSION = "11076708"

[task_config]
includes = ["mise-tasks"]

[tasks.build]
description = "Build debug APK"
run = "./gradlew assembleDebug"

[tasks.test]
description = "Run unit tests"
run = "./gradlew test"

[tasks.install-phone]
description = "Build debug APK and install on connected Android device"
run = "./gradlew installDebug"
