# Android development tasks
#
# Tasks are auto-discovered from mise-tasks/ directory.
# Task names match filenames (e.g., mise-tasks/format.sh -> //kotlin/android:format)

[settings]
auto_install = false

[env]
# Single source of truth for Android tool versions used by tasks and setup.sh.
# Keep the NDK version in sync with `ndkVersion` in `app/build.gradle.kts`.
NDK_VERSION = "28.2.13676358"
ANDROID_CMD_TOOLS_VERSION = "11076708"

[task_config]
includes = ["mise-tasks"]

[tasks.test]
description = "Run unit tests"
run = "./gradlew test"

[tools]
"aqua:firebase/firebase-tools" = "15.18.0"
