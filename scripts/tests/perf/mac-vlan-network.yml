# A docker compose override file to use a mac-vlan network.
#
# Forcing the traffic out through the physical interface ensures that GSO/GRO are functioning correctly
# and allows us to test the relay's eBPF module.
# Without an actual physical interface, the eBPF module would pick up the non-segmented UDP traffic which it cannot handle.

networks:
  relays:
    driver: macvlan
    driver_opts:
      parent: eth0.99 # Matches what is setup in GitHub actions VMs.
      ipvlan_mode: l2 # Populate MAC addresses.
    ipam:
      config:
        # Observation has shown that GitHub's runners usually have IPs in the 10.0.0.0/24 subnet.
        # We use the 10.0.3.0 subnet here for our containers and hope that there is no conflict ...
        # VLANs require an existing network to attach to (Docker doesn't create them automatically).
        - subnet: 10.0.0.0/22
          gateway: 10.0.0.1
          ip_range: 10.0.3.0/24

services:
  # client:
  #   networks:
  #     app:
  #       ipv4_address: 10.0.3.100
  #
  # gateway:
  #   networks:
  #     app:
  #       ipv4_address: 10.0.3.105

  relay-1:
    environment:
      PUBLIC_IP4_ADDR: ${RELAY_1_PUBLIC_IP4_ADDR:-10.0.3.101}
      EBPF_OFFLOADING: eth0
      FIREZONE_API_URL: "${FIREZONE_API_URL:-MUST_BE_SET}"
    privileged: true # Needed to load eBPF prog
    cap_add:
      - NET_ADMIN
    networks:
      relays:
        ipv4_address: ${RELAY_1_PUBLIC_IP4_ADDR:-10.0.3.101}

  relay-2:
    environment:
      PUBLIC_IP4_ADDR: ${RELAY_2_PUBLIC_IP4_ADDR:-10.0.3.201}
      EBPF_OFFLOADING: eth0
      FIREZONE_API_URL: "${FIREZONE_API_URL:-MUST_BE_SET}"
    privileged: true # Needed to load eBPF prog
    cap_add:
      - NET_ADMIN
    networks:
      relays:
        ipv4_address: ${RELAY_2_PUBLIC_IP4_ADDR:-10.0.3.201}
