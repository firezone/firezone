# A docker compose override file to use a mac-vlan network.
#
# Forcing the traffic out through the physical interface ensures that GSO/GRO are functioning correctly
# and allows us to test the relay's eBPF module.
# Without an actual physical interface, the eBPF module would pick up the non-segmented UDP traffic which it cannot handle.

networks:
  app:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 10.0.0.0/22
          gateway: 10.0.0.1
          ip_range: 10.0.3.0/24

services:
  client:
    networks:
      app:
        ipv4_address: 10.0.3.100

  gateway:
    networks:
      app:
        ipv4_address: 10.0.3.105

  relay-1:
    environment:
      PUBLIC_IP4_ADDR: 10.0.3.101
      EBPF_OFFLOADING: eth0
    privileged: true # Needed to load eBPF prog
    cap_add:
      - NET_ADMIN
    networks:
      app:
        ipv4_address: 10.0.3.101

  relay-2:
    environment:
      PUBLIC_IP4_ADDR: 10.0.3.201
      EBPF_OFFLOADING: eth0
    privileged: true # Needed to load eBPF prog
    cap_add:
      - NET_ADMIN
    networks:
      app:
        ipv4_address: 10.0.3.201
