# Overlay that swaps the client/gateway/relay images for benchmark images:
# locally-built release binaries layered onto the CI-built debug images
# (same recipe as the CI `perf/*` images).
#
# Build the binaries first (see scripts/benchmark/build-binaries.sh), then:
#
#   docker compose -f docker-compose.yml -f scripts/benchmark/compose.bench.yml build client-1 gateway relay-1

services:
  portal-router: &bench-router
    build: !override
      context: scripts/router
      dockerfile: ../benchmark/Dockerfile.router

  client-1-router: *bench-router
  client-2-router: *bench-router
  gateway-router: *bench-router
  relay-1-router: *bench-router
  relay-2-router: *bench-router

  client-1:
    image: localhost/bench/client:latest
    build: !override
      context: rust
      dockerfile: ../scripts/benchmark/Dockerfile
      args:
        BASE_IMAGE: ${BENCH_BASE_CLIENT:-ghcr.io/firezone/debug/client:main}
        PACKAGE: firezone-headless-client
        INIT_SCRIPT: docker-init-client.sh

  client-2:
    image: localhost/bench/client:latest
    build: !override
      context: rust
      dockerfile: ../scripts/benchmark/Dockerfile
      args:
        BASE_IMAGE: ${BENCH_BASE_CLIENT:-ghcr.io/firezone/debug/client:main}
        PACKAGE: firezone-headless-client
        INIT_SCRIPT: docker-init-client.sh

  gateway:
    image: localhost/bench/gateway:latest
    build: !override
      context: rust
      dockerfile: ../scripts/benchmark/Dockerfile
      args:
        BASE_IMAGE: ${BENCH_BASE_GATEWAY:-ghcr.io/firezone/debug/gateway:main}
        PACKAGE: firezone-gateway
        INIT_SCRIPT: docker-init-gateway.sh

  relay-1:
    image: localhost/bench/relay:latest
    build: !override
      context: rust
      dockerfile: ../scripts/benchmark/Dockerfile
      args:
        BASE_IMAGE: ${BENCH_BASE_RELAY:-ghcr.io/firezone/debug/relay:main}
        PACKAGE: firezone-relay
        INIT_SCRIPT: docker-init-relay.sh

  relay-2:
    image: localhost/bench/relay:latest
    build: !override
      context: rust
      dockerfile: ../scripts/benchmark/Dockerfile
      args:
        BASE_IMAGE: ${BENCH_BASE_RELAY:-ghcr.io/firezone/debug/relay:main}
        PACKAGE: firezone-relay
        INIT_SCRIPT: docker-init-relay.sh
