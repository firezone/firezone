name: Nix
run-name: Triggered by ${{ github.actor }}
on:
  workflow_call:
    inputs:
      sha:
        description: "Commit to build. Defaults to the workflow sha."
        required: false
        type: string
      push_to_cache:
        description: "Sign and push the built closures to the binary cache"
        required: false
        type: boolean
        default: false
      systems:
        description: "JSON list of Nix systems to build"
        required: false
        type: string
        default: '["x86_64-linux", "aarch64-linux"]'
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit to build. Defaults to the workflow sha."
        required: false
        type: string
      push_to_cache:
        description: "Sign and push the built closures to the binary cache"
        required: false
        type: boolean
        default: false
      systems:
        description: "JSON list of Nix systems to build"
        required: false
        type: string
        default: '["x86_64-linux", "aarch64-linux"]'

permissions:
  contents: read
  id-token: write # OIDC auth for the Azure binary cache upload

jobs:
  build:
    name: build-${{ matrix.system }}
    # The nix-cache-publish environment holds NIX_CACHE_SIGNING_KEY and is
    # restricted to main and release tags; PR builds never push or sign.
    environment: ${{ inputs.push_to_cache && 'nix-cache-publish' || '' }}
    strategy:
      fail-fast: false
      matrix:
        # An `include` with runner mappings would re-add excluded systems
        # (non-matching include entries become new combinations), so the
        # runner is derived from the system instead.
        system: ${{ fromJSON(inputs.systems) }}
    runs-on: ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
      - uses: ./.github/actions/free-disk-space
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
          diagnostic-endpoint: ""
          # Substitute from the first-party cache (kept warm by main and
          # release builds) instead of rebuilding.
          extra-conf: |
            extra-substituters = https://artifacts.firezone.dev/nix
            extra-trusted-public-keys = artifacts.firezone.dev/nix-1:T4LHdL1HeA6LE9qgu0Po0j3RIlelKZz8pzqnzEAIRfI=
      - name: Check flake
        run: nix flake check --no-build
      - name: Build packages
        id: build
        shell: bash
        run: |
          set -o pipefail

          build() {
            nix build \
              .#firezone-gateway \
              .#firezone-headless-client \
              .#firezone-gui-client \
              --print-build-logs 2>&1 | tee build.log
          }

          if build; then
            exit 0
          fi

          # The frontend's fetchPnpmDeps hash drifts whenever
          # rust/gui-client/pnpm-lock.yaml changes (dependabot bumps, or merge
          # skew between a lockfile PR and an unrelated one). Recompute it and
          # rebuild so the build stays green and the cache stays warm. The
          # cache-publish run then opens a PR to commit the corrected value.
          if grep -q 'hash mismatch in fixed-output derivation' build.log \
            && grep -q 'pnpm-deps' build.log; then
            echo "pnpm-deps hash drifted; recomputing and rebuilding."
            ./scripts/nix/update-pnpm-hash.sh
            echo "hash_changed=true" >> "$GITHUB_OUTPUT"
            build
          else
            echo "Nix build failed for a non-hash reason." >&2
            exit 1
          fi
      - name: Set up GnuPG for the bump commit
        # Only the cache-publish context (main / release tags) is trusted with
        # the bot credentials, and one matrix leg is enough to open the PR.
        if: ${{ inputs.push_to_cache && steps.build.outputs.hash_changed == 'true' && matrix.system == 'x86_64-linux' }}
        uses: ./.github/actions/setup-gpg
        id: setup-gpg
        with:
          key: ${{ secrets.RELEASE_PR_BOT_GPG_KEY }}
          email: github-bot@firezone.dev
      - name: Open pnpm-deps hash bump PR
        if: ${{ inputs.push_to_cache && steps.build.outputs.hash_changed == 'true' && matrix.system == 'x86_64-linux' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --local user.email "github-bot@firezone.dev"
          git config --local user.name "Firezone Bot"
          git config --local user.signingkey "${{ steps.setup-gpg.outputs.key_id }}"
          git config --local commit.gpgsign true

          branch="chore/nix-pnpm-hash"
          git checkout -b "$branch"
          git commit -am "fix(nix): bump gui-client pnpm-deps hash"

          # The checkout persists the default (read-only) GITHUB_TOKEN as an
          # http.extraheader, which git sends regardless of the remote URL's
          # embedded credentials. Clear it so the bot token below is actually
          # used, letting the PR's checks run (a GITHUB_TOKEN push would not
          # trigger them). An empty value resets the extra headers to the
          # empty list (see `git help config`), unlike `--unset-all`, which
          # would fail if checkout didn't happen to set one.
          git config --local http.https://github.com/.extraheader ""
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin HEAD --force

          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "fix(nix): bump gui-client pnpm-deps hash" \
              --body "rust/gui-client/pnpm-lock.yaml changed; refreshing the fetchPnpmDeps pin so local Nix builds match CI." \
              --reviewer firezone/engineering
          fi
      - name: Azure login (OIDC)
        if: ${{ inputs.push_to_cache }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_ARTIFACTS_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_ARTIFACTS_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ARTIFACTS_SUBSCRIPTION_ID }}
          # The artifacts principal holds only a data-plane role on the storage
          # account, not subscription-wide Reader.
          allow-no-subscriptions: true
      - name: Sign and push to binary cache
        if: ${{ inputs.push_to_cache }}
        env:
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
        run: ./scripts/upload/nix-cache.sh
