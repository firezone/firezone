name: Publish release
run-name: Triggered by ${{ github.actor }}
on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Existing release name to publish"
        required: true
  release:
    types:
      - published

concurrency:
  group: "publish-production-${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish-docker-images:
    if: >-
      ${{
        startsWith(inputs.release_name || github.event.release.name, 'gateway') ||
        startsWith(inputs.release_name || github.event.release.name, 'headless-client')
      }}
    runs-on: ubuntu-24.04
    permissions:
      packages: write # push promoted Docker images to GHCR
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set variables
        id: set-variables
        env:
          release_name: ${{ inputs.release_name || github.event.release.name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -xe

          if [[ "$release_name" =~ gateway* ]]; then
            ARTIFACT=gateway
            VERSION=${release_name#gateway-}
          elif [[ "$release_name" =~ headless* ]]; then
            ARTIFACT=client
            VERSION=${release_name#headless-client-}
          else
            echo "Shouldn't have gotten here. Exiting."
            exit 1
          fi

          MAJOR_VERSION="${VERSION%%.*}"
          MAJOR_MINOR_VERSION="${VERSION%.*}"

          sha=$(gh release view "${release_name}" --json targetCommitish -q '.targetCommitish')

          # shellcheck disable=SC2129 # individual env exports are cleaner
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor_version=$MAJOR_MINOR_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Pull and push
        run: |
          set -xe

          SOURCE_TAG=ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:${{ steps.set-variables.outputs.sha }}

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.revision=${{ steps.set-variables.outputs.sha }}" \
            -t ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:${{ steps.set-variables.outputs.version }} \
            -t ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:${{ steps.set-variables.outputs.version }}-${{ steps.set-variables.outputs.sha }} \
            -t ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:${{ steps.set-variables.outputs.major_version }} \
            -t ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:${{ steps.set-variables.outputs.major_minor_version }} \
            -t ghcr.io/firezone/${{ steps.set-variables.outputs.artifact }}:latest \
            $SOURCE_TAG

  # Builds the Nix packages at the tagged commit, signs the closures and
  # pushes them to the binary cache so users pinning the new release tag
  # substitute instead of compiling from source.
  resolve-nix-cache-sha:
    if: >-
      ${{
        startsWith(inputs.release_name || github.event.release.name, 'gateway') ||
        startsWith(inputs.release_name || github.event.release.name, 'headless-client') ||
        startsWith(inputs.release_name || github.event.release.name, 'gui-client')
      }}
    runs-on: ubuntu-24.04
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: resolve
        env:
          release_name: ${{ inputs.release_name || github.event.release.name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -xe

          sha=$(gh release view "$release_name" --json targetCommitish -q '.targetCommitish')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  publish-nix-cache:
    needs: resolve-nix-cache-sha
    uses: ./.github/workflows/_nix.yml
    secrets: inherit
    permissions:
      contents: read
    with:
      sha: ${{ needs.resolve-nix-cache-sha.outputs.sha }}
      push_to_cache: true

  # WINGET_TOKEN requirements (read this before debugging auth failures):
  #
  # Must be a **classic** PAT owned by `firezone-bot` with the `public_repo`
  # scope, and `firezone-bot` must be a write collaborator on the fork
  # `firezone/winget-pkgs`.
  #
  # We deliberately do NOT grant the `workflow` scope. That means
  # `komac sync-fork` will fail ("UpdateRef" denied) whenever upstream
  # microsoft/winget-pkgs has new commits touching `.github/workflows/*`,
  # because syncing the fork would require writing workflow files. When that
  # happens, sync `firezone/winget-pkgs` manually (e.g. via the GitHub "Sync
  # fork" button on the repo page) and re-run this job. The tradeoff: adding
  # `workflow` scope would grant the bot write access to workflow files in
  # every repo where it is a collaborator, which we consider too broad.
  #
  # Do NOT switch to a fine-grained PAT: komac opens the winget PR from
  # `firezone/winget-pkgs` into `microsoft/winget-pkgs`, and fine-grained PATs
  # cannot create PRs into repos outside their resource owner — the push
  # succeeds but `komac update --submit` fails with "Resource not accessible
  # by personal access token / failed to create pull request".
  publish-clients-to-winget:
    name: Publish ${{ matrix.identifier }} to winget
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - identifier: Firezone.Client.GUI
            tag_prefix: gui-client
          - identifier: Firezone.Client.Headless
            tag_prefix: headless-client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: get-version
        run: |
          version=${{ inputs.release_name || github.event.release.name }}
          version=${version#${{ matrix.tag_prefix }}-}
          echo "version=$version" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: ./.github/actions/winget-releaser
        if: ${{ startsWith((inputs.release_name || github.event.release.name), matrix.tag_prefix) }}
        with:
          identifier: ${{ matrix.identifier }}
          version: ${{ steps.get-version.outputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
          release-notes-url: https://www.firezone.dev/changelog
          release-tag: ${{ inputs.release_name || github.event.release.tag_name || github.ref_name }}

  open-version-bump-pr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # TODO: This hack is needed because the macOS client isn't tagged as `apple-client`.
          - tag_prefix: gateway
            component: gateway
          - tag_prefix: gui-client
            component: gui-client
          - tag_prefix: headless-client
            component: headless-client
          - tag_prefix: macos-client
            component: apple-client
          - tag_prefix: android-client
            component: android-client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-gpg
        id: setup-gpg
        if: ${{ startsWith(inputs.release_name || github.event.release.name, matrix.tag_prefix) }}
        with:
          key: ${{ secrets.RELEASE_PR_BOT_GPG_KEY }}
          email: github-bot@firezone.dev
      - name: Export gateway checksums
        if: ${{ startsWith(inputs.release_name || github.event.release.name, 'gateway') && matrix.component == 'gateway' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
          release_name: ${{ inputs.release_name || github.event.release.name }}
        run: |
          set -euo pipefail

          version=${release_name#gateway-}
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          gh release download "$release_name" \
            --pattern "firezone-gateway_${version}_*.sha256sum.txt" \
            --dir "$tmpdir"

          for arch in x86_64 aarch64 armv7; do
            checksum_file="$tmpdir/firezone-gateway_${version}_${arch}.sha256sum.txt"
            checksum=$(awk '{ print $1 }' "$checksum_file")

            if [[ ! "$checksum" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid checksum in $checksum_file: $checksum" >&2
              exit 1
            fi

            case "$arch" in
              x86_64) env_name=GATEWAY_X86_64_SHA256 ;;
              aarch64) env_name=GATEWAY_AARCH64_SHA256 ;;
              armv7) env_name=GATEWAY_ARMV7_SHA256 ;;
            esac

            echo "$env_name=$checksum" >> "$GITHUB_ENV"
          done
      - if: ${{ startsWith(inputs.release_name || github.event.release.name, matrix.tag_prefix) }}
        run: |
          set -x

          # Extract version from release name
          version=${{ inputs.release_name || github.event.release.name }}
          version=${version#${{ matrix.tag_prefix }}-}

          # Configure git
          git config --local user.email "github-bot@firezone.dev"
          git config --local user.name "Firezone Bot"
          git config --local user.signingkey "${{ steps.setup-gpg.outputs.key_id }}"
          git config --local commit.gpgsign true

          # Create the PR
          scripts/open-version-bump-pr.sh ${{ matrix.component }} "$version"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
          RELEASE_PR_BOT_GPG_KEY: "${{ secrets.RELEASE_PR_BOT_GPG_KEY }}"

  # The website half of the version bump (changelog entry + displayed version
  # markers) lives in firezone/website. Notify it of the publish; its
  # open-version-bump-pr workflow runs that repo's scripts/bump-versions.sh
  # and opens the PR there.
  notify-website:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # TODO: This hack is needed because the macOS client isn't tagged as `apple-client`.
          - tag_prefix: gateway
            component: gateway
          - tag_prefix: gui-client
            component: gui-client
          - tag_prefix: headless-client
            component: headless-client
          - tag_prefix: macos-client
            component: apple-client
          - tag_prefix: android-client
            component: android-client
    steps:
      - if: ${{ startsWith(inputs.release_name || github.event.release.name, matrix.tag_prefix) }}
        env:
          # repository_dispatch on firezone/website requires this token to
          # have Contents: write there.
          GH_TOKEN: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
          release_name: ${{ inputs.release_name || github.event.release.name }}
        run: |
          set -xeuo pipefail

          version=${release_name#${{ matrix.tag_prefix }}-}

          gh api \
            --method POST \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            /repos/firezone/website/dispatches \
            --raw-field "event_type=publish" \
            --field "client_payload[component]=${{ matrix.component }}" \
            --field "client_payload[version]=$version"

  create-sentry-release:
    name: create_${{ matrix.component }}_sentry_release
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # TODO: This hack is needed because the macOS client isn't tagged as `apple-client`.
        include:
          - component: gateway
            projects: gateway
          - component: gui-client
            projects: gui-client
          - component: headless-client
            projects: headless-client
          - component: macos-client
            projects: apple-client
          - component: android-client
            projects: android-client
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/create-sentry-release
        if: ${{ startsWith(github.event.release.name, matrix.component) }}
        with:
          component: ${{ matrix.component }}
          projects: ${{ matrix.projects }}
          sentry_token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  promote-deb-packages:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - tag_prefix: gateway
            deb_name: firezone-gateway
          - tag_prefix: gui-client
            deb_name: firezone-client-gui
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-azure-cli

      - name: Copy preview archive to import-stable
        if: ${{ startsWith(inputs.release_name || github.event.release.name, matrix.tag_prefix) }}
        run: |
          set -e

          # Extract version from release name
          version=${{ inputs.release_name || github.event.release.name }}
          version=${version#${{ matrix.tag_prefix }}-}

          # Copy `.deb`s to `import-stable`
          az storage blob copy start-batch \
            --destination-container apt \
            --source-container apt \
            --pattern "pool-preview/${{ matrix.deb_name }}_$version*" \
            --destination-path import-stable \
            --connection-string "${{ secrets.AZURERM_ARTIFACTS_CONNECTION_STRING }}"

  regenerate-apt-index:
    needs: promote-deb-packages
    uses: ./.github/workflows/_apt.yml
    secrets: inherit
