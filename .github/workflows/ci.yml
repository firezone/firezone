name: Continuous Integration
run-name: Triggered by ${{ github.actor }} on ${{ github.event_name }}
on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  workflow_call:
    inputs:
      stage:
        required: true
        type: string
      profile:
        required: true
        type: string

# Cancel old workflow runs if new code is pushed
concurrency:
  group: "ci-${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  planner:
    runs-on: ubuntu-latest
    outputs:
      jobs_to_run: ${{ steps.plan.outputs.jobs_to_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Plan jobs to run
        id: plan
        run: |
          set -e

          jobs="elixir,rust,tauri,kotlin,swift,codeql,control-plane,data-plane,loadtest";

          # For workflow_dispatch or workflow_call, run all jobs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"

            exit 0;
          fi

          # For main branch runs, run all jobs
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ]; then
            echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"

            exit 0;
          fi

          # Fetch base ref for PRs and merge group
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin ${{ github.base_ref }} --depth=1
            git diff --name-only "$base" ${{ github.sha }} > changed_files.txt

            echo "Changed files:"
            cat changed_files.txt
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            base="${{ github.event.merge_group.base_sha }}"
            git fetch origin "$base" --depth=1
            if ! git cat-file -e "${base}^{commit}"; then
              echo "::error::merge_group base SHA $base not available after fetch" >&2
              exit 1
            fi
            git diff --name-only "$base" ${{ github.sha }} > changed_files.txt

            echo "Changed files:"
            cat changed_files.txt
          fi

          # Run all jobs if CI configuration changes
          if grep -q '^\.github/' changed_files.txt; then
            echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"
            exit 0;
          fi

          # Run all jobs if tool versions change
          if grep -q '^\.tool-versions' changed_files.txt; then
            echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"
            exit 0;
          fi

          # Run all jobs if docker-compose changes
          if grep -q '^docker-compose.yml' changed_files.txt; then
            echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"
            exit 0;
          fi

          jobs=""

          if grep -q '^rust/' changed_files.txt; then
            jobs="${jobs},rust"
          fi

          # The data plane (client/gateway/relay/http-test-server images) and the
          # integration/compatibility tests that exercise them are built from the
          # headless client, gateway and relay. The platform client shims
          # (rust/gui-client for Tauri, rust/client-ffi for the Swift/Kotlin FFI)
          # are leaf crates that nothing in the data plane depends on, so a change
          # confined to them only needs the workspace `rust` job above plus the
          # tauri / kotlin / swift jobs. Run the data-plane chain only for rust
          # changes outside those shims.
          if grep '^rust/' changed_files.txt | grep -qEv '^rust/(gui-client|client-ffi)/'; then
            jobs="${jobs},control-plane,data-plane,loadtest"
          fi

          # Swift and Kotlin only build rust/client-ffi (the FFI shim) and its
          # workspace dependencies, which are platform-agnostic and already
          # covered by the `rust` job. The mobile builds exist to guard the FFI
          # boundary, so run them when client-ffi itself changes or when the
          # `uniffi` binding generator is bumped (handled just below). For
          # riskier changes elsewhere, trigger _swift.yml / _kotlin.yml manually
          # via workflow_dispatch.
          if grep -q '^rust/client-ffi/' changed_files.txt; then
            jobs="${jobs},kotlin,swift"
          fi

          # `uniffi` generates the Swift / Kotlin FFI bindings, so bumping it can
          # change the generated bindings (and break the mobile builds) even when
          # rust/client-ffi itself is untouched (e.g. a Dependabot bump or a bare
          # `cargo update`). Compare the locked `uniffi` package versions against
          # the base ref and pull in the mobile builds whenever they change. We
          # use Cargo.lock rather than Cargo.toml so we also catch lockfile-only
          # bumps that keep the same version requirement.
          git show "$base:rust/Cargo.lock" | grep -A1 '^name = "uniffi' > uniffi_base.txt || true
          grep -A1 '^name = "uniffi' rust/Cargo.lock > uniffi_head.txt || true
          if ! diff -q uniffi_base.txt uniffi_head.txt > /dev/null; then
            echo "uniffi dependency changed; scheduling kotlin + swift builds"
            jobs="${jobs},kotlin,swift"
          fi
          if grep -q '^rust/gui-client/' changed_files.txt; then
            jobs="${jobs},tauri"
          fi
          if grep -q '^rust/tests/gui-smoke-test/' changed_files.txt; then
            jobs="${jobs},tauri"
          fi
          if grep -q '^elixir/' changed_files.txt; then
            jobs="${jobs},elixir,codeql,control-plane,data-plane"
          fi
          if grep -q '^kotlin/' changed_files.txt; then
            jobs="${jobs},kotlin"
          fi
          if grep -q '^swift/' changed_files.txt; then
            jobs="${jobs},swift"
          fi
          if grep -q '^website/' changed_files.txt; then
            jobs="${jobs},codeql"
          fi
          if grep -q '^scripts/tests/' changed_files.txt; then
            jobs="${jobs},control-plane,data-plane"
          fi

          echo "jobs_to_run=$jobs" >> "$GITHUB_OUTPUT"

  required-check:
    name: required-check
    needs:
      [
        kotlin,
        swift,
        elixir,
        rust,
        tauri,
        codeql,
        control-plane,
        data-plane,
        integration-tests,
        compatibility-tests,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check if all jobs are successful
        run: |
          set -e

          jobs_json=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs | map(select((.name | contains("required-check") | not) and (.name | contains("upload-bencher") | not)))')
          failed_jobs=$(echo "$jobs_json" | jq -r '[.[] | select(.conclusion == "failure")] | length')

          if [ "$failed_jobs" -gt 0 ]; then
            echo "At least one job has failed."
            exit 1
          fi

  shell:
    name: shell-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.0.0
        id: setup-bats
      - run: bats scripts/tests/bats
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}

  kotlin:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'kotlin')
    uses: ./.github/workflows/_kotlin.yml
    secrets: inherit
    permissions:
      contents: write # release draft and build artifact uploads
      id-token: write # OIDC auth
      security-events: write # trivy SARIF upload from setup-mise

  monitor-kotlin:
    needs: [kotlin]
    if: "!cancelled() && needs.kotlin.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  swift:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'swift')
    uses: ./.github/workflows/_swift.yml
    secrets: inherit
    permissions:
      contents: write # release draft and build artifact uploads
      id-token: write # OIDC auth
      security-events: write # trivy SARIF upload from setup-mise

  monitor-swift:
    needs: [swift]
    if: "!cancelled() && needs.swift.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  elixir:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'elixir')
    uses: ./.github/workflows/_elixir.yml
    secrets: inherit
    permissions:
      checks: write # dorny/test-reporter

  monitor-elixir:
    needs: [elixir]
    if: "!cancelled() && needs.elixir.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  rust:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'rust')
    uses: ./.github/workflows/_rust.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write # OIDC auth
      security-events: write # trivy SARIF upload from setup-mise

  monitor-rust:
    needs: [rust]
    if: "!cancelled() && needs.rust.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  tauri:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'tauri')
    uses: ./.github/workflows/_tauri.yml
    secrets: inherit
    permissions:
      contents: write # release draft and build artifact uploads
      id-token: write # OIDC auth

  monitor-tauri:
    needs: [tauri]
    if: "!cancelled() && needs.tauri.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  codeql:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'codeql')
    uses: ./.github/workflows/_codeql.yml
    secrets: inherit
    permissions:
      actions: read
      contents: read
      security-events: write # upload CodeQL results

  monitor-codeql:
    needs: [codeql]
    if: "!cancelled() && needs.codeql.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  control-plane:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'control-plane')
    uses: ./.github/workflows/_control-plane.yml
    secrets: inherit
    permissions:
      id-token: write # OIDC auth
      packages: write # push Docker images to GHCR
      security-events: write # upload Trivy SARIF results

  monitor-control-plane:
    needs: [control-plane]
    if: "!cancelled() && needs.control-plane.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  data-plane:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'data-plane')
    uses: ./.github/workflows/_data-plane.yml
    secrets: inherit
    permissions:
      contents: write # create/update GitHub releases
      id-token: write # OIDC auth
      packages: write # push Docker images to GHCR
      security-events: write # upload Trivy SARIF results
    with:
      # Build debug/ on PRs and merge group, no prefix for production release images
      image_prefix: ${{ ((github.event_name == 'pull_request' || github.event_name == 'merge_group') && 'debug') || '' }}
      profile: ${{ inputs.profile || 'debug' }}
      stage: ${{ inputs.stage || 'debug' }}

  monitor-data-plane:
    needs: [data-plane]
    if: "!cancelled() && needs.data-plane.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  loadtest:
    needs: planner
    if: contains(needs.planner.outputs.jobs_to_run, 'loadtest')
    uses: ./.github/workflows/_loadtest.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write # OIDC auth for Azure Storage uploads

  monitor-loadtest:
    needs: [loadtest]
    if: "!cancelled() && needs.loadtest.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    permissions:
      actions: write # gh run cancel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh run cancel ${{ github.run_id }}

  integration-tests:
    uses: ./.github/workflows/_integration_tests.yml
    needs: [control-plane, data-plane]
    secrets: inherit
    permissions:
      contents: read
      id-token: write # OIDC auth
      pull-requests: write # post test result comments
    with:
      gateway_image: ${{ needs.data-plane.outputs.gateway_image }}
      client_image: ${{ needs.data-plane.outputs.client_image }}
      relay_image: ${{ needs.data-plane.outputs.relay_image }}
      http_test_server_image: ${{ needs.data-plane.outputs.http_test_server_image }}

  compatibility-tests:
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        client:
          - image: ${{ needs.data-plane.outputs.client_image }}
            tag: ${{ github.sha }}
            ci-name: sha
          - image: "ghcr.io/firezone/client"
            tag: "latest"
            ci-name: latest
        gateway:
          - image: ${{ needs.data-plane.outputs.gateway_image }}
            tag: ${{ github.sha }}
            ci-name: sha
          - image: "ghcr.io/firezone/gateway"
            tag: "latest"
            ci-name: latest
    # Don't run compatibility tests when called from hotfix.yml or publish.yml on `main` because
    # it'll be red if there was a breaking change we're trying to publish,
    # and the deploy_production workflow checks for main to be green.
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    name: compatibility-tests-client(${{ matrix.client.ci-name }})-gateway(${{ matrix.gateway.ci-name }})
    uses: ./.github/workflows/_integration_tests.yml
    needs: [control-plane, data-plane]
    secrets: inherit
    permissions:
      contents: read
      id-token: write # OIDC auth
      pull-requests: write # post test result comments
    with:
      gateway_image: ${{ matrix.gateway.image }}
      gateway_tag: ${{ matrix.gateway.tag }}
      client_image: ${{ matrix.client.image }}
      client_tag: ${{ matrix.client.tag }}

  coverage-finish:
    name: coverage-finish
    needs: [elixir, rust, swift]
    if: needs.elixir.result != 'skipped' || needs.rust.result != 'skipped' || needs.swift.result != 'skipped'
    runs-on: ubuntu-24.04
    steps:
      - name: Finalize coverage upload
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          carryforward: portal,rust-tunnel-test,rust-test-Linux,rust-test-macOS,rust-test-Windows,swift-test
          fail-on-error: false # Make CI less flaky
