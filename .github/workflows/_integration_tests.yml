name: Integration Tests
run-name: Triggered from ${{ github.event_name }} by ${{ github.actor }}
on:
  workflow_call:
    inputs:
      id:
        description: "Unique identifier for this invocation. Used to namespace the artifact holding the pre-pulled images so that concurrent invocations within the same run don't collide."
        required: true
        type: string
      portal_image:
        required: false
        type: string
        default: "ghcr.io/firezone/portal"
      portal_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      elixir_image:
        required: false
        type: string
        default: "ghcr.io/firezone/elixir"
      elixir_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      relay_image:
        required: false
        type: string
        default: "ghcr.io/firezone/debug/relay"
      relay_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      gateway_image:
        required: false
        type: string
        default: "ghcr.io/firezone/debug/gateway"
      gateway_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      client_image:
        required: false
        type: string
        default: "ghcr.io/firezone/debug/client"
      client_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      http_test_server_image:
        required: false
        type: string
        default: "ghcr.io/firezone/debug/http-test-server"
      http_test_server_tag:
        required: false
        type: string
        default: ${{ github.sha }}

jobs:
  collect-images:
    name: collect-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      PORTAL_IMAGE: ${{ inputs.portal_image }}
      PORTAL_TAG: ${{ inputs.portal_tag }}
      RELAY_IMAGE: ${{ inputs.relay_image }}
      RELAY_TAG: ${{ inputs.relay_tag }}
      GATEWAY_IMAGE: ${{ inputs.gateway_image }}
      GATEWAY_TAG: ${{ inputs.gateway_tag }}
      CLIENT_IMAGE: ${{ inputs.client_image }}
      CLIENT_TAG: ${{ inputs.client_tag }}
      ELIXIR_IMAGE: ${{ inputs.elixir_image }}
      ELIXIR_TAG: ${{ inputs.elixir_tag }}
      HTTP_TEST_SERVER_IMAGE: ${{ inputs.http_test_server_image }}
      HTTP_TEST_SERVER_TAG: ${{ inputs.http_test_server_tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/ghcr-docker-login
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/setup-scripts
      - name: Pull all images once
        # Pulls every registry image in the compose project (resolving `extends`,
        # anchors and env interpolation). Services that are only built locally
        # (the routers) have no `image:` and are skipped, so we additionally pull
        # their base image (see `scripts/router/Dockerfile`) to let the test jobs
        # build the routers without reaching out to Docker Hub.
        run: |
          retry docker compose pull
          retry docker pull alpine:3.23
      - name: Save pulled images as a single archive
        run: |
          set -xe

          # Save exactly the images that were pulled (i.e. are present locally) so
          # that the auto-generated names of build-only services are excluded.
          images=$(docker compose config --images | sort -u | while read -r image; do
            if docker image inspect "$image" > /dev/null 2>&1; then
              echo "$image"
            fi
          done)

          # Also archive the routers' base image so the build-only `*-router`
          # services can be built offline in the test jobs.
          images="$images alpine:3.23"

          echo "Saving images:"
          echo "$images"

          # shellcheck disable=SC2086 # $images must be split into separate args
          docker save $images | zstd --long=30 -T0 -o images.tar.zst
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          overwrite: true
          name: images-${{ inputs.id }}
          path: images.tar.zst
          compression-level: 0
          retention-days: 1

  integration-tests:
    name: ${{ matrix.test.name || matrix.test.script }}
    runs-on: ubuntu-24.04
    needs: collect-images
    permissions:
      contents: read
      id-token: write # OIDC auth
      pull-requests: write # post test result comments
    env:
      PORTAL_IMAGE: ${{ inputs.portal_image }}
      PORTAL_TAG: ${{ inputs.portal_tag }}
      RELAY_IMAGE: ${{ inputs.relay_image }}
      RELAY_TAG: ${{ inputs.relay_tag }}
      GATEWAY_IMAGE: ${{ inputs.gateway_image }}
      GATEWAY_TAG: ${{ inputs.gateway_tag }}
      CLIENT_IMAGE: ${{ inputs.client_image }}
      CLIENT_TAG: ${{ inputs.client_tag }}
      ELIXIR_IMAGE: ${{ inputs.elixir_image }}
      ELIXIR_TAG: ${{ inputs.elixir_tag }}
      HTTP_TEST_SERVER_IMAGE: ${{ inputs.http_test_server_image }}
      HTTP_TEST_SERVER_TAG: ${{ inputs.http_test_server_tag }}
      FIREZONE_INC_BUF: true
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        test:
          - script: create-flow-from-icmp-error
            min_client_version: 1.5.4
          - script: download-rst
            min_gateway_version: 1.4.18
          - script: curl-portal-down
          - script: curl-portal-restart
          - script: curl-ecn
          - script: dns
          - script: dns-portal-down
          - script: dns-nm
          - script: dns-two-resources
          - script: static-device-pool
            extra_services: client-2
            min_client_version: 1.5.9
          - name: dns-systemd-resolved
            script: systemd/dns-systemd-resolved
          - script: tcp-dns
          - script: download-concurrent
            min_gateway_version: 1.5.3
          - name: download-double-symmetric-nat
            script: download
            # Setting both client and gateway to random masquerade will force relay-relay candidate pair
            client_masquerade: random
            gateway_masquerade: random
            rust_log: debug,flow_logs=trace
            single_relay: true # Force single relay
            min_gateway_version: 1.4.18
          - name: download-double-symmetric-nat-iceless
            script: download
            # Setting both client and gateway to random masquerade will force relay-relay candidate pair
            client_masquerade: random
            gateway_masquerade: random
            rust_log: debug,flow_logs=trace,path_agent=trace
            single_relay: true # Force single relay
            iceless: true
            min_gateway_version: 1.4.18
          - name: download-ipv4-only
            script: download
            gateway_disable_ipv6: 1
            min_gateway_version: 1.4.19
          - script: download-packet-loss
            rust_log: debug
          - name: download-packet-loss-iceless
            script: download-packet-loss
            rust_log: debug,path_agent=trace
            iceless: true
          - script: download-roaming-network
            min_gateway_version: 1.4.18
            rust_log: debug,flow_logs=trace # Too noisy can cause flaky tests due to the amount of data
          - name: download-roaming-network-iceless
            script: download-roaming-network
            min_gateway_version: 1.4.18
            iceless: true
            rust_log: debug,path_agent=trace,flow_logs=trace # Too noisy can cause flaky tests due to the amount of data
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-docker
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: images-${{ inputs.id }}
      - name: Load pre-pulled images
        run: zstd -dc --long=30 images.tar.zst | docker load
      - uses: ./.github/actions/setup-scripts
      - name: Check minimum client version
        id: client_version_check
        if: ${{ matrix.test.min_client_version }}
        continue-on-error: true
        run: |
          ACTUAL_VERSION=$(docker run --pull never --privileged ${{ inputs.client_image }}:${{ inputs.client_tag }} firezone-headless-client --version | awk '{print $2}')
          MIN_VERSION="${{ matrix.test.min_client_version }}"

          echo "ACTUAL_VERSION=${ACTUAL_VERSION}"
          echo "MIN_VERSION=${MIN_VERSION}"

          [ "$(printf '%s\n' "$MIN_VERSION" "$ACTUAL_VERSION" | sort --version-sort | head -n1)" == "$MIN_VERSION" ]
      - name: Check minimum gateway version
        id: gateway_version_check
        if: ${{ matrix.test.min_gateway_version }}
        continue-on-error: true
        run: |
          ACTUAL_VERSION=$(docker run --pull never --privileged ${{ inputs.gateway_image }}:${{ inputs.gateway_tag }} firezone-gateway --version | awk '{print $2}')
          MIN_VERSION="${{ matrix.test.min_gateway_version }}"

          echo "ACTUAL_VERSION=${ACTUAL_VERSION}"
          echo "MIN_VERSION=${MIN_VERSION}"

          [ "$(printf '%s\n' "$MIN_VERSION" "$ACTUAL_VERSION" | sort --version-sort | head -n1)" == "$MIN_VERSION" ]
      - name: Seed database
        env:
          FEATURE_ICELESS_ENABLED: ${{ matrix.test.iceless && 'true' || 'false' }}
        run: docker compose run --pull never elixir /bin/sh -c 'mix ecto.migrate && mix ecto.seed'
      - name: Start docker compose in the background
        if: ${{ steps.client_version_check.outcome != 'failure' && steps.gateway_version_check.outcome != 'failure' }} # Run if version checks succeed or are skipped
        run: |
          set -xe

          if [[ -n "${{ matrix.test.rust_log }}" ]]; then
            export RUST_LOG="${{ matrix.test.rust_log }}"
          fi

          if [[ -n "${{ matrix.test.client_masquerade }}" ]]; then
            export CLIENT_MASQUERADE="${{ matrix.test.client_masquerade }}"
          fi

          if [[ -n "${{ matrix.test.gateway_masquerade }}" ]]; then
            export GATEWAY_MASQUERADE="${{ matrix.test.gateway_masquerade }}"
          fi

          if [[ -n "${{ matrix.test.gateway_disable_ipv6 }}" ]]; then
            export GATEWAY_DISABLE_IPV6="${{ matrix.test.gateway_disable_ipv6 }}"
          fi

          docker compose build client-1-router gateway-router relay-1-router relay-2-router portal-router client-2-router

          # Start one-by-one to avoid variability in service startup order
          # Retries are used because network I/O is flaky in GitHub Actions runners
          retry docker compose up -d dns.httpbin.search.test --no-build --pull never
          retry docker compose up -d httpbin --no-build --pull never
          retry docker compose up -d download.httpbin --no-build --pull never
          retry docker compose up -d portal --no-build --pull never
          retry docker compose up -d otel --no-build --pull never
          retry docker compose up -d relay-1 --no-build --pull never
          retry docker compose up -d relay-2 --no-build --pull never
          retry docker compose up -d gateway --no-build --pull never
          retry docker compose up -d client-1 ${{ matrix.test.extra_services }} --no-build --pull never
          retry docker compose up -d network-config --pull never

          docker compose exec -d relay-1 /bin/sh -c 'xdpdump -i eth0 -w /tmp/packets.pcap --rx-capture entry,exit'
          docker compose exec -d relay-2 /bin/sh -c 'xdpdump -i eth0 -w /tmp/packets.pcap --rx-capture entry,exit'

          if [[ -n "${{ matrix.test.single_relay }}" ]]; then
            docker compose stop relay-2
          fi

          sleep 3 # Let everything settle for a bit

      - name: Disable checksum offloading
        run: |
          # Force checksum calculation on the host since some tests run on the host
          sudo ethtool -K eth0 tx off
          sudo ethtool -K docker0 tx off

      - run: ./scripts/tests/${{ matrix.test.script }}.sh
        if: ${{ steps.client_version_check.outcome != 'failure' && steps.gateway_version_check.outcome != 'failure' }} # Run the script if version checks succeed or are skipped

      - name: Ensure Client emitted no warnings
        if: "!cancelled()"
        run: |
          # Disabling checksum offloading causes one or two "I/O error (os error 5)" warnings
          docker compose logs client-1 client-2 | \
            grep --invert "I/O error (os error 5)" | \
            grep "WARN" && exit 1 || exit 0
      - name: Show Client logs
        if: "!cancelled()"
        run: docker compose logs client-1 client-2

      - name: Show Relay-1 logs
        if: "!cancelled()"
        run: docker compose logs relay-1

      - name: Show Relay-2 logs
        if: "!cancelled()"
        run: docker compose logs relay-2

      - name: Ensure Gateway emitted no warnings
        if: "!cancelled()"
        run: |
          # Disabling checksum offloading causes one or two "I/O error (os error 5)" warnings
          docker compose logs gateway | \
            grep --invert "I/O error (os error 5)" | \
            ${{ matrix.test.gateway_disable_ipv6 == 1 && 'grep --invert "Failed to add route: Received a netlink error message Permission denied (os error 13) route=fd00:2021:1111::/107" |' || '' }} \
            grep "WARN" && exit 1 || exit 0
      - name: Show Gateway logs
        if: "!cancelled()"
        run: docker compose logs gateway

      - name: Show Portal logs
        if: "!cancelled()"
        run: docker compose logs portal

      - name: Show Postgres logs
        if: "!cancelled()"
        run: docker compose logs postgres

      - name: Ensure no eBPF checksum errors on relay-1
        if: "!cancelled() && steps.client_version_check.outcome != 'failure' && steps.gateway_version_check.outcome != 'failure'"
        run: |
          set -xe

          docker compose exec relay-1 pkill xdpdump
          docker compose cp relay-1:/tmp/packets.pcap ./relay-1-packets.pcap

          ! tcpdump -nnnr ./relay-1-packets.pcap -v | grep "bad \w* cksum"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: "!success()"
        with:
          overwrite: true
          name: ${{ matrix.test.name || matrix.test.script }}-relay-1-xdpdump
          path: ./relay-1-packets.pcap

      - name: Ensure no eBPF checksum errors on relay-2
        if: "!cancelled() && !matrix.test.single_relay && steps.client_version_check.outcome != 'failure' && steps.gateway_version_check.outcome != 'failure'"
        run: |
          set -xe

          docker compose exec relay-2 pkill xdpdump
          docker compose cp relay-2:/tmp/packets.pcap ./relay-2-packets.pcap

          ! tcpdump -nnnr ./relay-2-packets.pcap -v | grep "bad \w* cksum"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: "!success() && !matrix.test.single_relay"
        with:
          overwrite: true
          name: ${{ matrix.test.name || matrix.test.script }}-relay-2-xdpdump
          path: ./relay-2-packets.pcap
