name: Build Android app
on:
  workflow_call:
  workflow_dispatch:

defaults:
  run:
    working-directory: ./kotlin/android

permissions:
  contents: "read"
  id-token: "write" # OIDC auth

jobs:
  static-analysis:
    # Android SDK tools hardware accel is available only on Linux runners
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-android
      - name: Check formatting
        run: ./gradlew spotlessCheck
      # Lint pulls a connlib cargo build (the `main` source set includes the
      # uniffi-generated bindings). Lint runs per-variant, never per-ABI, so
      # narrowing to one ABI keeps coverage identical while avoiding the 4-ABI build.
      - name: Run Android Lint
        run: ./gradlew lint -Pandroid.injected.build.abi=x86_64

  update-release-draft:
    name: update-release-draft
    runs-on: ubuntu-24.04
    permissions:
      contents: write # for updating the release draft
    env:
      # mark:next-android-version
      RELEASE_NAME: android-client-1.5.11
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        if: "${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}"
        id: update-release-draft
        with:
          config-name: release-drafter-android-client.yml
          tag: ${{ env.RELEASE_NAME }}
          version: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_release:
    permissions:
      contents: write # for uploading artifacts to the release
      id-token: write # OIDC auth
      security-events: write # trivy SARIF upload from setup-mise
    name: build-release-${{ matrix.package-type }}
    needs: update-release-draft
    if: "${{ github.event_name == 'workflow_dispatch' }}"
    # Android SDK tools hardware accel is available only on Linux runners
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        include:
          - package-type: aab
            build-command: "./gradlew bundleRelease"
            output-path: app/build/outputs/bundle/release/app-release.aab
          - package-type: apk
            build-command: "./gradlew assembleRelease"
            output-path: app/build/outputs/apk/release/app-release.apk
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-tags: true # Otherwise we cannot embed the correct version into the build.
      - uses: ./.github/actions/setup-android
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd kotlin/android
      - name: Build the release package
        env:
          KEYSTORE_BASE64: ${{ secrets.GOOGLE_UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.GOOGLE_UPLOAD_KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.GOOGLE_UPLOAD_KEYSTORE_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$(pwd)/app/keystore.jks"
          echo -n "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          ${{ matrix.build-command }}
          rm "$KEYSTORE_PATH"
      - name: Setup sentry CLI
        if: "${{ github.event_name == 'workflow_dispatch' }}"
        uses: matbour/setup-sentry-cli@3e938c54b3018bdd019973689ef984e033b0454b #v2.0.0
        with:
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: firezone-inc
      - name: Upload debug symbols to Sentry
        if: "${{ github.event_name == 'workflow_dispatch' }}"
        run: |
          sentry-cli debug-files upload --log-level info --project android-client --include-sources ../../rust/target
      - name: Run Unit Test
        run: |
          ./gradlew testReleaseUnitTest
      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Android ${{ matrix.package-type }}
          path: |
            ./kotlin/android/${{ matrix.output-path }}
      - name: Upload package to release
        if: ${{ github.ref_name == 'main' && matrix.package-type == 'apk' && github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # mark:next-android-version
          RELEASE_NAME: android-client-1.5.11
        run: |
          export ARTIFACT_PATH="$RUNNER_TEMP/firezone-${RELEASE_NAME}.${{ matrix.package-type }}"
          cp "${{ matrix.output-path }}" "$ARTIFACT_PATH"
          ../../scripts/upload/github-release.sh
      - name: Authenticate to Google Cloud (Firebase)
        if: ${{ matrix.package-type == 'aab' && github.event_name == 'workflow_dispatch' }}
        id: firebase-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/215658742954/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: firebase-app-distributor@firezone-55040.iam.gserviceaccount.com
      - name: Distribute release to Firebase App Distribution
        if: ${{ matrix.package-type == 'aab' && github.event_name == 'workflow_dispatch' }}
        env:
          NO_UPDATE_NOTIFIER: "1"
          FIREBASE_APP_TESTERS: ${{ vars.FIREBASE_APP_TESTERS }}
        run: |
          firebase_args=(
            appdistribution:distribute "${{ matrix.output-path }}"
            --app "1:215658742954:android:51cc714762dbfbb59e7cd3"
            --release-notes "https://www.firezone.dev/changelog"
            --groups "firezone-engineering"
          )

          if [[ -n "${FIREBASE_APP_TESTERS:-}" ]]; then
            firebase_args+=(--testers "$FIREBASE_APP_TESTERS")
          fi

          firebase --non-interactive "${firebase_args[@]}"
      - name: Upload Crashlytics symbols
        if: ${{ matrix.package-type == 'aab' && github.event_name == 'workflow_dispatch' }}
        run: ./gradlew --no-daemon uploadCrashlyticsSymbolFileRelease
      - name: Authenticate to Google Cloud (Play Store upload)
        if: ${{ matrix.package-type == 'aab' && github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/215658742954/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: play-store-publisher@firezone-55040.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher
          access_token_lifetime: 600s
      # The play-store-publisher service account is intentionally granted only
      # internal-track upload permission in the Play Console. Production-track
      # permission would let it (or anyone who compromises CI) publish a release
      # straight to end users. Promotion from internal -> production is a manual
      # step in the Play Console.
      - name: Upload AAB to Google Play Console (internal track)
        if: ${{ matrix.package-type == 'aab' && github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}
        env:
          ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          PACKAGE_NAME: dev.firezone.android
          AAB_PATH: ${{ matrix.output-path }}
          TRACK: internal
          RELEASE_STATUS: draft
        run: ../../scripts/upload/play-store.sh

  build_debug:
    # Android SDK tools hardware accel is available only on Linux runners
    runs-on: ubuntu-24.04
    name: build-debug
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-android
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Android debug APK
          path: |
            ./kotlin/android/app/build/outputs/apk/*
