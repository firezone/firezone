---
name: Fuzz corpus (nightly)
run-name: Triggered from ${{ github.event_name }}
# Grows and minimizes the committed `tunnel` fuzz corpus, then opens a bot PR
# with the result plus the refreshed coverage snapshot that `_rust.yml` pins
# exactly. This job rediscovers coverage the per-PR run does not have time for
# (and re-anchors it after `arb.rs` changes decode the same bytes into
# different transitions). A maintainer reviews and merges the PR to adopt the
# grown corpus.
"on":
  schedule:
    - cron: "0 4 * * *" # daily, 04:00 UTC
  workflow_dispatch:

defaults:
  run:
    working-directory: ./rust

permissions:
  contents: read

concurrency:
  group: fuzz-nightly
  cancel-in-progress: true

jobs:
  discover:
    name: discover-corpus
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd rust/tests/fuzz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/free-disk-space
      - name: Discover new coverage (seeded from the committed corpus)
        run: mise run //rust/tests/fuzz:fuzz tunnel -fork=4 -max_len=8192 -len_control=0 -max_total_time=1800
      - name: Minimize corpus
        run: mise run //rust/tests/fuzz:cmin tunnel
      - name: Measure coverage and refresh the snapshot
        run: |
          mise run //rust/tests/fuzz:coverage tunnel
          mise run -q //rust/tests/fuzz:llvm-cov -- export -instr-profile=coverage/tunnel/coverage.profdata ../../target/x86_64-unknown-linux-gnu/release/tunnel | jq '[.data[].files[] | select(.filename | contains("libs/connlib/tunnel-proto/src/")) | .summary.regions] | {covered: (map(.covered) | add), total: (map(.count) | add)}' > tests/fuzz/expected-coverage.json
          cat tests/fuzz/expected-coverage.json
      - name: Set up GnuPG for the corpus commit
        uses: ./.github/actions/setup-gpg
        id: setup-gpg
        with:
          key: ${{ secrets.RELEASE_PR_BOT_GPG_KEY }}
          email: github-bot@firezone.dev
      - name: Open corpus update PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_BOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --local user.email "github-bot@firezone.dev"
          git config --local user.name "Firezone Bot"
          git config --local user.signingkey "${{ steps.setup-gpg.outputs.key_id }}"
          git config --local commit.gpgsign true

          branch="chore/fuzz-corpus"
          git checkout -b "$branch"
          git add -A tests/fuzz/corpus/tunnel tests/fuzz/expected-coverage.json
          if git diff --cached --quiet; then
            echo "Corpus unchanged; nothing to open a PR for."
            exit 0
          fi
          git commit -m "chore(fuzz): grow committed tunnel corpus"

          # The checkout persists the default (read-only) GITHUB_TOKEN as an
          # http.extraheader, which git sends regardless of the remote URL's
          # embedded credentials. Clear it so the bot token below is actually
          # used, letting the PR's checks run (a GITHUB_TOKEN push would not
          # trigger them). An empty value resets the extra headers to the
          # empty list (see `git help config`), unlike `--unset-all`, which
          # would fail if checkout didn't happen to set one.
          git config --local http.https://github.com/.extraheader ""
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin HEAD --force

          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "chore(fuzz): grow committed tunnel corpus" \
              --body "The nightly fuzz job discovered new coverage. The grown corpus comes with the refreshed snapshot that the per-PR tunnel-proto coverage gate in \`_rust.yml\` pins exactly." \
              --reviewer firezone/engineering
          fi
