---
name: Rust
"on":
  workflow_call:

defaults:
  run:
    working-directory: ./rust

permissions:
  contents: "read"
  id-token: "write" # OIDC auth
  security-events: "write" # trivy SARIF upload from setup-mise

env:
  RUSTFLAGS: "--cfg tokio_unstable --deny warnings"
  RUSTDOCFLAGS: "--deny warnings"

jobs:
  static-analysis:
    name: static-analysis-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # TODO: https://github.com/rust-lang/cargo/issues/5220
        runs-on: [ubuntu-24.04, macos-26, windows-2022]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust-stable
      - uses: ./.github/actions/setup-rust-target-dependency-cache
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd rust
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Only Linux compiles the eBPF program (`--all-features` enables it).
      - run: mise run //rust:install-ebpf-toolchain
        if: runner.os == 'Linux'
      - run: cargo clippy --all-targets --all-features ${{ steps.setup-rust-stable.outputs.compile-packages }}
        name: cargo clippy
        shell: bash
      - run: cargo doc --all-features --no-deps --document-private-items ${{ steps.setup-rust-stable.outputs.compile-packages }}
        name: cargo doc
        shell: bash
      - run: cargo fmt -- --check
      - run: cargo deny check --hide-inclusion-graph --deny unnecessary-skip
        shell: bash
      # cargo-shear does not compile the workspace; it runs `cargo metadata` and
      # parses sources, so it piggy-backs on the toolchain already set up here.
      - run: cargo shear
        name: cargo shear
        shell: bash

  monitor-static-analysis:
    needs: [static-analysis]
    if: "!cancelled() && needs.static-analysis.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    steps:
      - run: gh run cancel ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: test-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # TODO: https://github.com/rust-lang/cargo/issues/5220
        runs-on: [ubuntu-24.04, macos-26, windows-2025]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-tauri-v2
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd rust
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Only Linux compiles the eBPF program (`--all-features` enables it).
      - run: mise run //rust:install-ebpf-toolchain
        if: runner.os == 'Linux'
      - uses: ./.github/actions/free-disk-space
      - name: "cargo test"
        shell: bash
        run: cargo llvm-cov --all-features ${{ steps.setup-rust.outputs.test-packages }} --lcov --output-path lcov.info -- --include-ignored --nocapture
        env:
          # <https://github.com/rust-lang/cargo/issues/5999>
          # Needed to create tunnel interfaces in unit tests
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sudo --preserve-env"
          # Needed to create utun devices in the Apple TUN integration tests
          CARGO_TARGET_AARCH64_APPLE_DARWIN_RUNNER: "sudo --preserve-env"
          # Minimise DWARF debuginfo for the coverage build: source-based
          # coverage data lives in __llvm_covmap, independent of debug info, so
          # lcov.info / Coveralls are unaffected while target/ shrinks ~60%.
          # `line-tables-only` keeps file:line in panic backtraces. eBPF BTF is
          # unaffected (built separately under the release profile via aya_build).
          CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
          CARGO_PROFILE_TEST_DEBUG: "line-tables-only"

      - uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        env:
          # The macOS runner installs the reporter from the coverallsapp/coveralls
          # Homebrew tap, which Homebrew 6.0.0 refuses to load unless trusted.
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: rust/lcov.info
          format: lcov
          flag-name: rust-test-${{ runner.os }}
          parallel: true
          fail-on-error: false

  tunnel_test:
    name: tunnel-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd rust/tests/fuzz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/free-disk-space
      - name: Replay committed corpus under coverage instrumentation
        run: mise run //rust/tests/fuzz:coverage tunnel
      # The llvm-cov task runs with cwd rust/tests/fuzz, so the profdata and
      # binary paths are relative to that directory while the lcov.info
      # redirect below lands in the step's cwd (rust/).
      - name: Enforce tunnel-proto coverage threshold
        run: |
          pct=$(mise run -q //rust/tests/fuzz:llvm-cov -- export -instr-profile=coverage/tunnel/coverage.profdata ../../target/x86_64-unknown-linux-gnu/release/tunnel | jq '[.data[].files[] | select(.filename | contains("libs/connlib/tunnel-proto/src/")) | .summary.regions] | (map(.covered) | add) / (map(.count) | add) * 100')
          echo "tunnel-proto region coverage: ${pct}% (min 70%)"
          jq -e -n "$pct >= 70" > /dev/null || { echo "::error::tunnel-proto coverage ${pct}% below 70% — the committed corpus regressed; grow it via the nightly fuzz job."; exit 1; }
      - name: Export lcov for Coveralls
        run: mise run -q //rust/tests/fuzz:llvm-cov -- export -format=lcov -instr-profile=coverage/tunnel/coverage.profdata ../../target/x86_64-unknown-linux-gnu/release/tunnel > lcov.info
      - uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: rust/lcov.info
          format: lcov
          flag-name: rust-tunnel-test
          parallel: true
          fail-on-error: false

  fuzz:
    name: fuzz
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        fuzz-target: [ip_packet, tunnel]
        include:
          - fuzz-target: tunnel
            libfuzzer-args: "-max_len=8192 -len_control=0"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/setup-mise
        with:
          install_args: --cd rust/tests/fuzz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Fuzz ${{ matrix.fuzz-target }}
        run: mise run //rust/tests/fuzz:fuzz ${{ matrix.fuzz-target }} -max_total_time=120 ${{ matrix.libfuzzer-args }}
      # On a crash, replay the offending input through the just-built binary
      # with tracing on, so the failing scenario (one line per applied
      # transition plus the `❌` mismatch) lands directly in this job's log
      # rather than only in the uploaded artifact. `cargo fuzz run` propagates
      # `RUST_LOG` too, but invoking the binary directly avoids a redundant
      # cargo rebuild-check.
      - name: Replay crashing input with tracing
        if: failure()
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(tests/fuzz/artifacts/${{ matrix.fuzz-target }}/{crash,timeout,oom,leak,slow-unit}-*)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No crash artifact was written; nothing to replay."
            exit 0
          fi
          bin=target/x86_64-unknown-linux-gnu/release/${{ matrix.fuzz-target }}
          for f in "${artifacts[@]}"; do
            echo "::group::Scenario for $(basename "$f")"
            RUST_LOG=debug "$bin" "$f" || true
            echo "::endgroup::"
          done

  headless-client:
    name: headless-client-${{ matrix.test }}-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        include:
          - { runs-on: windows-2022, test: token-path-windows.ps1 }
          - { runs-on: windows-2025, test: token-path-windows.ps1 }
          - { runs-on: ubuntu-22.04, test: linux-group.sh }
          - { runs-on: ubuntu-24.04, test: linux-group.sh }
          - { runs-on: ubuntu-22.04, test: token-path-linux.sh }
          - { runs-on: ubuntu-24.04, test: token-path-linux.sh }
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-rust-stable
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
      - run: scripts/tests/${{ matrix.test }}
        name: "test script"
        working-directory: ./
