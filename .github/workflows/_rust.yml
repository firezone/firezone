---
name: Rust
"on":
  workflow_call:

defaults:
  run:
    working-directory: ./rust

permissions:
  contents: "read"
  id-token: "write" # OIDC auth

env:
  RUSTFLAGS: "--cfg tokio_unstable --deny warnings"
  RUSTDOCFLAGS: "--deny warnings"

jobs:
  static-analysis:
    name: static-analysis-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # TODO: https://github.com/rust-lang/cargo/issues/5220
        runs-on: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust-stable
      - uses: ./.github/actions/setup-rust-nightly
        id: setup-rust-nightly
      - uses: ./.github/actions/setup-rust-target-dependency-cache
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: ${{ steps.setup-rust-nightly.outputs.nightly_version }}
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: cargo-deny
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        if: ${{ runner.os == 'Linux' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: bpf-linker

      - run: cargo clippy --all-targets --all-features ${{ steps.setup-rust-stable.outputs.compile-packages }}
        name: cargo clippy
        shell: bash
      - run: cargo doc --all-features --no-deps --document-private-items ${{ steps.setup-rust-stable.outputs.compile-packages }}
        name: cargo doc
        shell: bash
      - run: cargo fmt -- --check
      - name: Guard RUSTSEC-2026-0097 allowlist assumption
        run: |
          # RUSTSEC-2026-0097 is allowlisted because rand's `log` feature is not enabled,
          # meaning the vulnerable re-entrant ThreadRng code path is compiled out.
          # If a dependency ever enables rand/log, the allowlist is no longer valid.
          if cargo tree -e features 2>/dev/null | grep -q 'rand feature "log"'; then
            echo "::error::rand's 'log' feature is now enabled — RUSTSEC-2026-0097 allowlist in deny.toml is no longer safe to keep"
            exit 1
          fi
        shell: bash
      - run: cargo deny check --hide-inclusion-graph --deny unnecessary-skip
        shell: bash

  monitor-static-analysis:
    needs: [static-analysis]
    if: "!cancelled() && needs.static-analysis.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    steps:
      - run: gh run cancel ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unused-dependencies:
    name: unused-dependencies-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # TODO: https://github.com/rust-lang/cargo/issues/5220
        runs-on: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust-stable
      - uses: ./.github/actions/setup-rust-nightly
        id: setup-rust-nightly
      - uses: ./.github/actions/setup-rust-target-dependency-cache
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          key: ${{ steps.setup-rust-nightly.outputs.nightly_version }}
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: cargo-udeps
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        if: ${{ runner.os == 'Linux' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: bpf-linker
      - run: cargo +${{ steps.setup-rust-nightly.outputs.nightly_version }} udeps --verbose --all-targets --all-features ${{ steps.setup-rust-stable.outputs.compile-packages }}
        name: cargo udeps

  monitor-unused-dependencies:
    needs: [unused-dependencies]
    if: "!cancelled() && needs.unused-dependencies.result == 'failure' && github.event_name == 'merge_group'"
    runs-on: ubuntu-latest
    steps:
      - run: gh run cancel ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: test-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        # TODO: https://github.com/rust-lang/cargo/issues/5220
        runs-on: [ubuntu-24.04, macos-26, windows-2025]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust
      - uses: ./.github/actions/setup-rust-nightly
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-tauri-v2
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        if: ${{ runner.os == 'Linux' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: bpf-linker
      - name: "cargo test"
        shell: bash
        run: cargo llvm-cov --all-features ${{ steps.setup-rust.outputs.test-packages }} --lcov --output-path lcov.info -- --include-ignored --nocapture --skip tunnel_test --skip transitions_and_state_are_deterministic
        env:
          # <https://github.com/rust-lang/cargo/issues/5999>
          # Needed to create tunnel interfaces in unit tests
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: "sudo --preserve-env"

      - uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: rust/lcov.info
          format: lcov
          flag-name: rust-test-${{ runner.os }}
          parallel: true
          fail-on-error: false

  tunnel_test:
    name: tunnel-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-stable
        id: setup-rust
      - uses: ./.github/actions/setup-rust-nightly
      - uses: ./.github/actions/setup-rust-sccache
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: cargo-llvm-cov
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: bpf-linker
      - name: Tunnel proptest
        id: proptest
        shell: bash
        run: cargo llvm-cov --features proptest --package tunnel --lcov --output-path lcov.info -- --nocapture tunnel_test transitions_and_state_are_deterministic 2>&1 | tee proptest.log
        env:
          PROPTEST_VERBOSE: 0 # Otherwise the output is very long.
          PROPTEST_CASES: 256
          RUST_BACKTRACE: 0
          CARGO_PROFILE_TEST_OPT_LEVEL: 1 # Otherwise the tests take forever.
          TUNNEL_TEST_ENFORCE_COVERAGE: 1 # Fail the test if we don't hit all intended codepaths.

      - name: Extract missing coverage patterns
        id: missing
        if: failure()
        shell: bash
        run: |
          missing=$(sed -n '/^TUNNEL_TEST_MISSING_PATTERNS_BEGIN$/,/^TUNNEL_TEST_MISSING_PATTERNS_END$/p' proptest.log | sed '1d;$d')
          if [ -n "$missing" ]; then
            {
              echo "patterns<<EOF"
              echo "$missing"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Missing coverage patterns:" >&2
            echo "$missing" >&2
          fi

      - name: Harvest regression seeds for missing coverage
        if: failure() && steps.missing.outputs.patterns != ''
        timeout-minutes: 25
        shell: bash
        env:
          PROPTEST_VERBOSE: 0
        run: |
          mapfile -t patterns <<< "${{ steps.missing.outputs.patterns }}"
          cargo run -p tunnel-proptest-harvester -- "${patterns[@]}"
      - name: Upload harvested seeds
        if: failure() && steps.missing.outputs.patterns != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: proptest-harvest-seeds
          path: rust/libs/connlib/tunnel/harvest-output/
          if-no-files-found: warn

      - uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: rust/lcov.info
          format: lcov
          flag-name: rust-tunnel-test
          parallel: true
          fail-on-error: false

  fuzz:
    name: fuzz
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        fuzz-target: [ip_packet]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-nightly
        id: setup-rust
      - uses: ./.github/actions/setup-rust-sccache
      - uses: taiki-e/install-action@b9c5db3aef04caffaf95a1d03931de10fb2a140f # v2.65.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: cargo-fuzz
      - run: rustup run ${{ steps.setup-rust.outputs.nightly_version }} cargo fuzz run --target x86_64-unknown-linux-gnu --fuzz-dir tests/fuzz ${{ matrix.fuzz-target }} -- -max_total_time=120
        env:
          CARGO_PROFILE_RELEASE_LTO: false

  headless-client:
    name: headless-client-${{ matrix.test }}-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        include:
          - { runs-on: windows-2022, test: token-path-windows.ps1 }
          - { runs-on: windows-2025, test: token-path-windows.ps1 }
          - { runs-on: ubuntu-22.04, test: linux-group.sh }
          - { runs-on: ubuntu-24.04, test: linux-group.sh }
          - { runs-on: ubuntu-22.04, test: token-path-linux.sh }
          - { runs-on: ubuntu-24.04, test: token-path-linux.sh }
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust-stable
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
      - run: scripts/tests/${{ matrix.test }}
        name: "test script"
        working-directory: ./
