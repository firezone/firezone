name: Build Tauri app
on:
  workflow_call:
  workflow_dispatch:

defaults:
  run:
    working-directory: ./rust/gui-client

env:
  TSLINK_BUILD: true

permissions:
  contents: "read"
  id-token: "write" # OIDC auth

jobs:
  update-release-draft:
    permissions:
      contents: write # for updating the release draft
      id-token: write # OIDC auth
    name: update-release-draft
    runs-on: ubuntu-24.04
    env:
      # mark:next-gui-version
      RELEASE_NAME: gui-client-1.5.15
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        if: "${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}"
        id: update-release-draft
        with:
          config-name: release-drafter-gui-client.yml
          tag: ${{ env.RELEASE_NAME }}
          version: ${{ env.RELEASE_NAME }}
          name: ${{ env.RELEASE_NAME }}
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-node
        with:
          npmjs-token: ${{ secrets.NPMJS_TOKEN }}
          lockfile-dir: ./rust/gui-client
      - run: pnpm install
      - run: pnpm eslint .

  # Runs the Tauri client smoke test, built in debug mode. We can't run it in release
  # mode because of a known issue: <https://github.com/firezone/firezone/blob/456e044f882c2bb314e19cc44c0d19c5ad817b7c/rust/windows-client/src-tauri/src/client.rs#L162-L164>
  smoke-test:
    name: gui-smoke-test-${{ matrix.runs-on }}
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        runs-on: [ubuntu-22.04, ubuntu-24.04, windows-2022, windows-2025]
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        # Must be in this dir for `pnpm` to work
        working-directory: ./rust/gui-client
      # The Windows client ignores RUST_LOG because it uses a settings file instead
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-node
        with:
          npmjs-token: ${{ secrets.NPMJS_TOKEN }}
          lockfile-dir: ./rust/gui-client
      - uses: ./.github/actions/setup-rust-stable
      - uses: ./.github/actions/setup-rust-sccache
      - uses: ./.github/actions/setup-tauri-v2
        timeout-minutes: 15
        with:
          runtime: true
      - run: pnpm install
      - run: pnpm vite build
      - name: Build client
        run: cargo build -p firezone-gui-client --all-targets
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool: dump_syms
      - name: Run smoke test
        working-directory: ./rust
        run: cargo run -p gui-smoke-test
        timeout-minutes: 4

  build-gui:
    name: build-gui-${{ matrix.runs-on }}
    needs: update-release-draft
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write # for attaching the build artifacts to the release
      id-token: write # OIDC auth
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        include:
          - runs-on: ubuntu-22.04
            arch: x86_64
            os: linux
            pkg-extension: deb
          - runs-on: ubuntu-22.04-arm
            arch: aarch64
            os: linux
            pkg-extension: deb
          - runs-on: windows-2022
            arch: x86_64
            os: windows
            pkg-extension: msi
    env:
      # mark:next-gui-version
      ARTIFACT_SRC: ./rust/gui-client/firezone-client-gui-${{ matrix.os }}_1.5.15_${{ matrix.arch }}
      # mark:next-gui-version
      ARTIFACT_DST: firezone-client-gui-${{ matrix.os }}_1.5.15_${{ matrix.arch }}
      AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_CERT_NAME: ${{ secrets.AZURE_CERT_NAME }}
      # mark:next-gui-version
      BINARY_DEST_PATH: firezone-client-gui-${{ matrix.os }}_1.5.15_${{ matrix.arch }}
      # Seems like there's no way to de-dupe env vars that depend on each other
      # mark:next-gui-version
      FIREZONE_GUI_VERSION: 1.5.15
      RENAME_SCRIPT: ../../scripts/build/tauri-rename-${{ matrix.os }}.sh
      TEST_INSTALL_SCRIPT: ../../scripts/tests/gui-client-install-${{ matrix.os }}-${{ matrix.pkg-extension }}
      TARGET_DIR: ../target
      UPLOAD_SCRIPT: ../../scripts/build/tauri-upload-${{ matrix.os }}.sh
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-tags: true # Otherwise we cannot embed the correct version into the build.
      - uses: ./.github/actions/setup-node
        with:
          npmjs-token: ${{ secrets.NPMJS_TOKEN }}
          lockfile-dir: ./rust/gui-client
      - uses: ./.github/actions/setup-rust-stable
      - uses: ./.github/actions/setup-rust-target-dependency-cache
        with:
          save-if: ${{ github.event_name == 'merge_group' || github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-tauri-v2
        # Installing new packages can take time
        timeout-minutes: 15
      - uses: matbour/setup-sentry-cli@3e938c54b3018bdd019973689ef984e033b0454b #v2.0.0
        with:
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: firezone-inc
      - name: Install pnpm deps
        run: pnpm install
      - uses: ./.github/actions/setup-azure-sign-tool
      - name: Build release exe and MSI / deb
        env:
          CARGO_PROFILE_RELEASE_LTO: thin # Fat LTO is getting too slow / RAM-hungry on Tauri builds
        # `tauri build` signs Firezone.exe (after Tauri patches it) and the
        # MSI via `bundle.windows.signCommand`.
        run: pnpm build
      - name: Ensure unmodified Git workspace
        run: git diff --exit-code
      - name: Rename artifacts and compute SHA256
        shell: bash
        run: ${{ env.RENAME_SCRIPT }}
      - name: Upload deb / msi package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_DST }}-${{ matrix.pkg-extension }}
          path: ${{ env.ARTIFACT_SRC }}.${{ matrix.pkg-extension }}
          if-no-files-found: error
      - name: Upload rpm package
        if: "${{ runner.os == 'Linux' }}"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_DST }}-rpm
          path: ${{ env.ARTIFACT_SRC }}.rpm
          if-no-files-found: error
      - name: Test installation (Linux)
        if: "${{ runner.os == 'Linux' }}"
        shell: bash
        run: ${{ env.TEST_INSTALL_SCRIPT }}.sh
      - name: Test installation (Windows)
        if: "${{ runner.os == 'Windows' }}"
        shell: powershell
        run: ${{ env.TEST_INSTALL_SCRIPT }}.ps1

      - name: Dump install.log
        # `always()` so the MSI's verbose log surfaces even when
        # `Test installation` itself failed (and `set -e` killed
        # the script before it could `cat` the log).
        if: "${{ always() && runner.os == 'Windows' }}"
        shell: bash
        run: cat install.log || true

      - name: Inspect MSI
        # Authenticode signature status + size + SHA256. Pin-points
        # the "MSI failed to open" failure mode: a tampered or
        # unsigned MSI shows up here as `Status: HashMismatch` /
        # `NotSigned`.
        if: "${{ always() && runner.os == 'Windows' }}"
        shell: pwsh
        run: |
          $msi = "$env:BINARY_DEST_PATH.msi"
          Get-Item $msi | Select-Object Name, Length, LastWriteTimeUtc | Format-List
          Get-FileHash -Algorithm SHA256 -Path $msi | Format-List
          Get-AuthenticodeSignature -FilePath $msi | Format-List Status, StatusMessage, SignerCertificate, TimeStamperCertificate

      - name: Dump MsiInstaller event log
        # Pulls the last 50 events Windows itself recorded for
        # `MsiInstaller`. These cover failure modes that
        # `install.log` doesn't (AV quarantine, signature
        # verification failure, ACL-blocked file copy, etc.).
        if: "${{ always() && runner.os == 'Windows' }}"
        shell: pwsh
        run: |
          Get-WinEvent -ProviderName 'MsiInstaller' -MaxEvents 50 -ErrorAction SilentlyContinue |
            Sort-Object TimeCreated |
            Select-Object TimeCreated, Id, LevelDisplayName, Message |
            Format-List

      - name: Dump register-sparse logs
        if: "${{ always() && runner.os == 'Windows' }}"
        shell: bash
        run: cat 'C:/ProgramData/dev.firezone.client/data/logs/register-sparse.latest' || true

      - name: Upload debug symbols to Sentry
        if: "${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}"
        run: |
          sentry-cli debug-files upload --log-level info --project gui-client --include-sources ../target

      - name: Upload Release Assets
        if: "${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: gui-client-${{ env.FIREZONE_GUI_VERSION }}
        shell: bash
        run: ${{ env.UPLOAD_SCRIPT }}

      - name: Azure login (OIDC)
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && runner.os == 'Linux' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_ARTIFACTS_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_ARTIFACTS_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ARTIFACTS_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Upload to preview repository
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && runner.os == 'Linux' }}
        shell: bash
        run: |
          az storage blob upload-batch \
            --destination apt \
            --source . \
            --pattern "*.deb" \
            --destination-path import-preview \
            --overwrite \
            --no-progress \
            --auth-mode login \
            --account-name firezoneartifacts

      - name: Azure login (OIDC) for QA artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_QA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_QA_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_QA_SUBSCRIPTION_ID }}
          # The QA principal only holds a data-plane role on the storage account,
          # not subscription-wide Reader, so don't fail on subscription enumeration.
          allow-no-subscriptions: true

      - name: Upload preview MSI to QA artifacts storage
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && runner.os == 'Windows' }}
        shell: bash
        run: |
          az storage blob upload \
            --account-name firezoneqaartifacts \
            --auth-mode login \
            --container-name binaries \
            --name "windows-gui-client/preview/${{ matrix.arch }}" \
            --file "${{ env.BINARY_DEST_PATH }}.msi" \
            --overwrite true \
            --no-progress

      - name: Upload preview deb to QA artifacts storage
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && runner.os == 'Linux' }}
        shell: bash
        run: |
          az storage blob upload \
            --account-name firezoneqaartifacts \
            --auth-mode login \
            --container-name binaries \
            --name "linux-gui-client/preview/${{ matrix.arch }}.deb" \
            --file "${{ env.BINARY_DEST_PATH }}.deb" \
            --overwrite true \
            --no-progress

      - name: Upload preview rpm to QA artifacts storage
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && runner.os == 'Linux' }}
        shell: bash
        run: |
          az storage blob upload \
            --account-name firezoneqaartifacts \
            --auth-mode login \
            --container-name binaries \
            --name "linux-gui-client/preview/${{ matrix.arch }}.rpm" \
            --file "${{ env.BINARY_DEST_PATH }}.rpm" \
            --overwrite true \
            --no-progress

  regenerate-apt-index:
    needs: build-gui
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' }}
    uses: ./.github/workflows/_apt.yml
    secrets: inherit
