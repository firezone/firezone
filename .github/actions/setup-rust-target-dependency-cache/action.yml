---
name: "Setup Rust `target` dir caching"
description: "Sets up caching for the Rust `target` directory, for dependencies only"
inputs:
  key:
    description: "Additional cache key"
    required: false
    default: ""
  save-if:
    description: "When to save the cache"
    required: true

runs:
  using: "composite"
  steps:
    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: rust
        cache-targets: true
        cache-workspace-crates: false
        # Disabled because every plugin in ~/.cargo/bin/ is installed via
        # taiki-e/install-action (prebuilt binaries). Caching ~/.cargo/bin/
        # provides no speed-up while exposing CI to cache-restore corruption
        # of the rustup-managed cargo binary.
        cache-bin: false
        key: ${{ inputs.key }}-${{ hashFiles('rust/.cargo/config.toml') }}
        prefix-key: v2-rust-deps
        save-if: ${{ inputs.save-if }}
