---
name: "Setup Rust"
description: "Sets up the correct Rust version"
inputs:
  targets:
    description: "Additional targets to install"
    required: false
    default: ""

outputs:
  bench-packages:
    description: Benchmarkable packages for the current OS
    value: ${{
      (runner.os == 'Linux' && '--help') ||
      (runner.os == 'macOS' && '--help') ||
      (runner.os == 'Windows' && '-p bin-shared') }}
  compile-packages:
    description: Compilable packages for the current OS
    value: ${{
      (runner.os == 'Linux' && '--workspace') ||
      (runner.os == 'macOS' && '--workspace') ||
      (runner.os == 'Windows' && '--workspace --exclude ebpf-turn-router --exclude client-ffi') }}
  test-packages:
    description: Testable packages for the current OS
    value: ${{
      (runner.os == 'Linux' && '--workspace') ||
      (runner.os == 'macOS' && '--workspace --exclude bin-shared --exclude firezone-gui-client') ||
      (runner.os == 'Windows' && '--workspace --exclude client-ffi') }}

runs:
  using: "composite"
  steps:
    # macos-26 ships a broken Homebrew rustup formula whose proxies reject
    # cargo argv (actions/runner-images#14099, #14097). Replace it with an
    # official install so PATH resolution is clean.
    - name: Replace Homebrew rustup with official install (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew uninstall --ignore-dependencies rustup 2>/dev/null || true
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --no-modify-path --default-toolchain none --profile minimal
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    # Auto-installs the channel + components pinned in rust/rust-toolchain.toml.
    - name: Install pinned Rust toolchain
      shell: bash
      working-directory: rust
      run: rustup show active-toolchain --install

    - name: Install additional targets
      if: ${{ inputs.targets != '' }}
      shell: bash
      working-directory: rust
      run: rustup target add ${{ inputs.targets }}
