---
name: "Setup mise"
description: "Installs mise with a pinned version and retry logic"
inputs:
  version:
    description: "mise version to install"
    required: false
    default: "2026.5.0"
  install_args:
    description: "Arguments to pass to `mise install`"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - shell: bash
      run: echo "MISE_LOCKED=1" >> "$GITHUB_ENV"
    - shell: bash
      run: echo "MISE_DEBUG=1" >> "$GITHUB_ENV"
    - shell: powershell
      if: ${{ runner.os == 'Windows' }}
      run: echo "MISE_INSTALLS_DIR=C:\.mise-installs" >> "$GITHUB_ENV"

    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      id: mise-1
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        install_args: ${{ inputs.install_args }}
        reshim: true
        cache_key_prefix: "mise-v1"

    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      if: ${{ steps.mise-1.outcome == 'failure' }}
      id: mise-2
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        install_args: ${{ inputs.install_args }}
        reshim: true
        cache_key_prefix: "mise-v1"

    - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      if: ${{ steps.mise-2.outcome == 'failure' }}
      with:
        version: ${{ inputs.version }}
        install_args: ${{ inputs.install_args }}
        reshim: true
        cache_key_prefix: "mise-v1"
