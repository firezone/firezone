---
name: "Setup Rust sccache"
description: "Sets up caching for Rust via sccache"
inputs:
  azure-connection-string:
    description: "Connection string for the Azure storage account backing the cache. When empty (forks, Dependabot), builds run uncached."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - name: Cache registry
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: rust
        cache-targets: false
        save-if: ${{ github.ref == 'refs/heads/main' }} # Only save on main

    - name: Configure sccache environment
      if: inputs.azure-connection-string != ''
      shell: bash
      env:
        AZURE_CONNECTION_STRING: ${{ inputs.azure-connection-string }}
      run: |
        {
          echo "SCCACHE_AZURE_CONNECTION_STRING=$AZURE_CONNECTION_STRING"
          echo "SCCACHE_AZURE_BLOB_CONTAINER=cache"
          echo "SCCACHE_AZURE_KEY_PREFIX=firezone"
          echo "RUSTC_WRAPPER=$SCCACHE_PATH"
        } >> "$GITHUB_ENV"

    - name: Start sccache
      if: inputs.azure-connection-string != ''
      run: ./scripts/retry.sh $SCCACHE_PATH --start-server
      continue-on-error: true
      shell: bash
      env:
        SCCACHE_CONF: ".github/actions/setup-rust-sccache/sccache.toml"
