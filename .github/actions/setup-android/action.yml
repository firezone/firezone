# From https://tauri.app/v1/guides/getting-started/prerequisites
name: "Setup Android"
description: "Sets up the dependencies for building our Android app"
runs:
  using: "composite"
  steps:
    - uses: marocchino/tool-versions-action@4219f2e6bfdb4cce482b78f71ad9663e64f4d247 # v2.0.0
      with:
        path: kotlin/android/.tool-versions

    - uses: ./.github/actions/setup-rust-stable
      with:
        targets: armv7-linux-androideabi aarch64-linux-android x86_64-linux-android i686-linux-android

    - uses: ./.github/actions/setup-rust-sccache

    - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      with:
        # By default tools and platform-tools are installed, which we don't use currently
        # These consume lots of disk space
        packages: ""

    # No NDK install step: we always pin `ndkVersion` in app/build.gradle.kts to a
    # version preinstalled on the ubuntu-24.04 runner (currently 28.2.13676358), so
    # there is nothing to download. Keep them in sync when bumping runner images.

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - run: touch local.properties
      shell: bash
